<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- GitHub Pages project site: 404.html is served from root but the browser URL
       reflects the missing page. Set base so all ./paths resolve from repo root. -->
  <base href="/bookatier-blueprint/">
  <title>Страница не найдена — β→α академия</title>
  <link rel="stylesheet" href="./styles/tokens.css">
  <link rel="stylesheet" href="./styles/chrome.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .error-main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: calc(var(--header-height) + var(--space-16)) var(--gutter, 2.5rem) var(--space-16);
      background-color: color-mix(in srgb, var(--paper) 80%, var(--surface-sunk) 20%);
      background-image: url('./assets/backgrounds/monogram-aged.png');
      background-repeat: repeat;
      background-size: 280px;
      background-blend-mode: multiply;
    }

    .error-card {
      position: relative; z-index: 1;
      text-align: center;
      border: 1px solid color-mix(in srgb, var(--danger, #C0392B) 25%, var(--line));
      border-radius: var(--radius-lg, 16px);
      background: color-mix(in srgb, var(--surface, #FFFDF8) 85%, transparent);
      padding: var(--space-16, 4rem) var(--space-20, 5rem);
      box-shadow: 0 2px 24px rgba(0,0,0,.06);
      max-width: 480px; width: 100%;
    }
    .error-icon { font-size: 2.5rem; line-height: 1; color: color-mix(in srgb, var(--danger, #C0392B) 55%, var(--ink-faint)); margin-bottom: var(--space-4, 1rem); }
    .error-code { font-family: var(--font-sans); font-size: var(--fs-caption, 0.75rem); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--danger, #C0392B); margin: 0 0 var(--space-2, 0.5rem); }
    .error-title { font-family: var(--font-serif); font-size: var(--fs-h2, 1.375rem); font-weight: 600; color: var(--ink); margin: 0 0 var(--space-3, 0.75rem); line-height: 1.3; }
    .error-desc { font-family: var(--font-sans); font-size: var(--fs-small, 0.875rem); color: var(--ink-soft); line-height: 1.55; margin: 0 0 var(--space-8, 2rem); }
    @media (max-width: 560px) { .error-card { padding: var(--space-12, 3rem) var(--space-8, 2rem); } }
  </style>
</head>
<body>
  <main class="error-main" id="main-content">
    <div class="error-card" role="alert">
      <div class="error-icon" aria-hidden="true">⊗</div>
      <p class="error-code">Ошибка 404</p>
      <h1 class="error-title">Страница не найдена</h1>
      <p class="error-desc">
        Запрошенная страница не существует или была перемещена.<br>
        Возможно, ссылка устарела — попробуйте вернуться на главную.
      </p>
      <a class="btn btn-ghost" href="./index.html">← На главную</a>
    </div>
  </main>

  <script src="./components/session.js"></script>
  <script src="./components/frame.js"></script>
  <script src="./components/avatar-menu.js"></script>
  <script src="./components/notifications.js"></script>
  <script src="./components/search.js"></script>
  <script src="./components/pulse.js"></script>
  <script src="./components/debug.js"></script>
  <script src="./components/book-card.js"></script>
  <script src="./components/member-card.js"></script>
  <script src="./components/author-card.js"></script>
  <script src="./components/remark-card.js"></script>
  <script src="./components/demo.js"></script>
  <script src="./components/registration.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      BA.frame.init({ page: 'error' });
      try {
        var saved = localStorage.getItem('ba-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
      } catch (e) {}
    });
  </script>
</body>
</html>
