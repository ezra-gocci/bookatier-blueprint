<!DOCTYPE html>
<html lang="ru" data-theme="sepia-contrast">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookatier — каркас (FrameUser, авторизованный)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles/tokens.css" />

  <style>
    /* ===================================================================
       frame-user.html — authorized chrome. Same skeleton as frame-pub.html;
       chrome swapped to the authorized variant (site-map.md v2.0 §3).
       Deltas vs FramePub: nav (D1), home badge href (D2), header actions
       Search·Pulse·Notifications·Avatar+Rep (D3), footer active links (D4/D5).
       =================================================================== */

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Global paper grain — recessive, fixed, theme-aware opacity */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("assets/backgrounds/monogram-cream.png");
      background-repeat: repeat;
      background-size: 320px;
      opacity: var(--grain-opacity);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: var(--container-max);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    /* Skip link — keyboard accessibility */
    .skip-link {
      position: absolute;
      left: var(--space-4);
      top: calc(var(--space-2) * -8);
      z-index: var(--z-toast);
      background: var(--surface);
      color: var(--ink);
      border: var(--hairline) solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4);
      font-size: var(--fs-small);
      transition: top var(--dur-base) var(--ease-out-quart);
    }
    .skip-link:focus { top: var(--space-2); }

    /* ---- Header (height locked here) -------------------------------- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
      background: color-mix(in srgb, var(--paper) 88%, transparent);
      backdrop-filter: saturate(140%) blur(8px);
      border-bottom: var(--hairline) solid var(--line);
    }
    /* Three-column grid → wordmark left, nav perfectly centered, actions right */
    .header-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: var(--space-4);
      height: var(--header-height);
    }

    /* Header top-left: image-based wordmark */
    .wordmark {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      opacity: 1;
      transition: opacity var(--dur-fast) var(--ease-out-quart);
    }
    .wordmark:hover { opacity: 0.82; }
    .wordmark-img { height: 32px; width: auto; display: block; }

    /* Serif text mark — used in nav home item, footer */
    .text-mark {
      font-family: var(--font-serif);
      font-size: var(--fs-h1);
      font-weight: var(--fw-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-display);
      line-height: 1;
      display: inline-flex;
      align-items: baseline;
      gap: 0.04em;
      flex-shrink: 0;
      transition: color var(--dur-fast) var(--ease-out-quart);
    }
    .text-mark .arrow { color: var(--accent); }
    .text-mark:hover { color: var(--accent); }

    /* ---- Centered primary nav + shared animated indicator ----------- */
    .primary-nav {
      justify-self: center;
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-6);
      padding-bottom: 10px;
    }
    .nav-link {
      font-family: var(--font-sans);
      font-size: var(--fs-small);
      font-weight: var(--fw-medium);
      letter-spacing: var(--tracking-label);
      color: var(--ink-soft);
      line-height: 1;
      padding-block: var(--space-1);
      transition: color var(--dur-fast) var(--ease-out-quart);
    }
    .nav-link:hover,
    .nav-link[aria-current="page"] { color: var(--accent); }

    /* Home nav item — noir badge identical to FramePub (bg #1F1B18, cream text, terracotta arrow) */
    .nav-link-home {
      font-family: var(--font-serif);
      font-size: var(--fs-body);
      font-weight: var(--fw-semibold);
      letter-spacing: var(--tracking-display);
      background: #1F1B18;
      color: #ECE3D6;
      padding: var(--space-1) var(--space-3) calc(var(--space-1) + 3px);
      border-radius: var(--radius-md);
      transition: opacity var(--dur-fast) var(--ease-out-quart);
    }
    .nav-link-home .arrow { color: #D2674A; }
    .nav-link-home:hover,
    .nav-link-home[aria-current="page"] {
      color: #ECE3D6;
      opacity: 0.85;
    }
    .nav-link-home:hover .arrow,
    .nav-link-home[aria-current="page"] .arrow {
      color: #D2674A;
    }

    /* Selected-item indicator: strip (slides) + dot (bounces) */
    .nav-strip,
    .nav-dot {
      position: absolute;
      pointer-events: none;
    }
    .nav-strip {
      background: var(--accent);
      bottom: 7px;
      height: var(--hairline);
      border-radius: var(--radius-pill);
      -webkit-mask: linear-gradient(90deg,
        #000 0, #000 calc(50% - 7px),
        transparent calc(50% - 7px), transparent calc(50% + 7px),
        #000 calc(50% + 7px), #000 100%);
      mask: linear-gradient(90deg,
        #000 0, #000 calc(50% - 7px),
        transparent calc(50% - 7px), transparent calc(50% + 7px),
        #000 calc(50% + 7px), #000 100%);
      transition: left 280ms var(--ease-out-quart),
                  width 280ms var(--ease-out-quart),
                  opacity 160ms var(--ease-out-quart);
    }
    .nav-dot {
      background: var(--amber);
      bottom: 4px;
      width: 7px;
      height: 7px;
      border-radius: var(--radius-pill);
      transform: translateX(-50%);
      transition: left 360ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  bottom 360ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .nav-strip:not([style]),
    .nav-dot:not([style]) { opacity: 0; }

    @media (prefers-reduced-motion: reduce) {
      .nav-strip,
      .nav-dot { transition: none; }
    }

    .header-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-shrink: 0;
    }

    /* ---- Header icon buttons — ghost, square-ish hit area ----------- */
    .icon-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      background: transparent;
      color: var(--ink-soft);
      border: var(--hairline) solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: color var(--dur-fast) var(--ease-out-quart),
                  border-color var(--dur-fast) var(--ease-out-quart);
    }
    .icon-btn:hover { color: var(--ink); border-color: var(--line); }
    .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Unread badge on the bell */
    .notif-count {
      position: absolute;
      top: 4px;
      right: 4px;
      min-width: 16px;
      height: 16px;
      padding-inline: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: var(--fw-semibold);
      line-height: 1;
      color: var(--on-accent);
      background: var(--accent);
      border-radius: var(--radius-pill);
    }

    /* Avatar combined with reputation — one pill control */
    .avatar-rep {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 3px 8px 3px 3px;
      border: var(--hairline) solid var(--line);
      border-radius: var(--radius-pill);
      background: var(--surface);
      text-decoration: none;
      transition: border-color var(--dur-fast) var(--ease-out-quart),
                  background var(--dur-fast) var(--ease-out-quart);
    }
    .avatar-rep:hover { border-color: var(--accent); background: var(--surface-sunk); }
    .avatar-rep:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .avatar-rep__face {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: var(--on-accent);
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      font-weight: var(--fw-semibold);
      letter-spacing: 0;
    }
    .avatar-rep__score {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      color: var(--amber);
    }
    .avatar-rep__num {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      font-weight: var(--fw-semibold);
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    /* ---- Main content well ------------------------------------------ */
    .site-main {
      position: relative;
      flex: 1;
      display: grid;
      place-items: center;
      padding-block: var(--space-24);
      isolation: isolate;
      background-color: color-mix(in srgb, var(--paper) 80%, var(--surface-sunk) 20%);
      background-image: url("assets/backgrounds/monogram-cream.png");
      background-repeat: repeat;
      background-size: 280px;
      background-blend-mode: multiply;
    }
    .content-wash {
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image: var(--wash-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: var(--wash-opacity);
      -webkit-mask-image: radial-gradient(120% 90% at 50% 42%, #000 38%, transparent 88%);
      mask-image: radial-gradient(120% 90% at 50% 42%, #000 38%, transparent 88%);
      pointer-events: none;
    }

    .placeholder-card {
      position: relative;
      z-index: 1;
      text-align: center;
      border: var(--hairline) solid var(--line);
      border-radius: var(--radius-lg);
      background: color-mix(in srgb, var(--surface) 70%, transparent);
      padding: var(--space-16) var(--space-24);
      box-shadow: var(--shadow-soft);
    }
    .placeholder-card .seal {
      font-family: var(--font-serif);
      font-size: var(--fs-h2);
      color: var(--ink-faint);
      display: inline-flex;
      gap: 0.04em;
      margin-bottom: var(--space-4);
    }
    .placeholder-card .seal .arrow { color: var(--accent); }
    .placeholder-card p {
      font-family: var(--font-sans);
      font-size: var(--fs-small);
      letter-spacing: var(--tracking-label);
      color: var(--ink-soft);
    }
    .placeholder-card .hint {
      margin-top: var(--space-2);
      font-size: var(--fs-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--ink-soft);
    }

    /* ---- Footer — menu-free NOIR band ------------------------------- */
    .site-footer {
      position: relative;
      z-index: 1;
      background: var(--paper);
      border-top: var(--hairline) solid var(--line);
    }
    .footer-inner {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-4);
      padding-block: var(--space-8);
    }
    .footer-brand {
      display: flex;
      align-items: baseline;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .footer-brand .text-mark { font-size: var(--fs-h2); }
    .footer-tagline {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--ink-soft);
    }
    .build-tag {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--ink-soft);
    }

    /* Active footer links — About + Console (§3 Footer, Delta 4/5) */
    .footer-links {
      display: inline-flex;
      align-items: baseline;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .footer-link {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--ink-soft);
      text-decoration: none;
      transition: color var(--dur-fast) var(--ease-out-quart);
    }
    .footer-link:hover { color: var(--accent); }
    .footer-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ---- Responsive (desktop-first) --------------------------------- */
    @media (max-width: 760px) {
      .primary-nav { display: none; }
      /* No .nav-about in FrameUser — that rule is omitted here */
      :root { --gutter: var(--space-6); }
      .placeholder-card { padding: var(--space-12) var(--space-8); }
    }
    @media (max-width: 460px) {
      .header-inner { gap: var(--space-3); }
      .header-actions { gap: var(--space-2); }
      /* Collapse avatar pill to face only — rep score hidden at smallest size */
      .avatar-rep__score { display: none; }
    }
  </style>
</head>

<body>
  <a class="skip-link" href="#content">К содержимому</a>

  <!-- ===================================================================
       HEADER — authorized frame (site-map.md v2.0 §3)
       Wordmark · centered auth nav (Сообщество · β→α home · Библиотека) ·
       Search / Pulse / Notifications / Avatar+Rep.
       =================================================================== -->
  <header class="site-header">
    <div class="header-inner container">
      <a class="wordmark" href="index.html" aria-label="beta→alpha — на главную">
        <img class="wordmark-img" src="assets/decor/a2b-logo.png" alt="beta→alpha">
      </a>

      <!-- Delta 1: authorized nav — Community · Home · Library -->
      <nav class="primary-nav" aria-label="Основная навигация">
        <a class="nav-link" href="community.html">Сообщество</a>
        <a class="nav-link nav-link-home" href="home.html" aria-label="Домашняя" aria-current="page">β<span class="arrow">→</span>α</a>
        <a class="nav-link" href="library.html">Библиотека</a>

        <!-- Shared selected-item indicator: strip (slides) + dot (bounces) -->
        <span class="nav-strip" aria-hidden="true"></span>
        <span class="nav-dot" aria-hidden="true"></span>
      </nav>

      <!-- Delta 3: Authorized header actions — Search (E) · Pulse (G) ·
           Notifications bell (C) · Avatar+Rep (D). These replace the
           anonymous frame's Войти/Регистрация CTAs; no Login/Registration
           overlays exist in this frame. -->
      <div class="header-actions">
        <!-- Search (E) → search panel / results -->
        <button class="icon-btn" type="button" aria-label="Поиск" data-stub>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
          </svg>
        </button>

        <!-- Pulse (G) → live event-stream overlay -->
        <button class="icon-btn" type="button" aria-label="Пульс" data-stub>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </button>

        <!-- Notifications (C) bell + unread badge → dropdown / notifications.html -->
        <button class="icon-btn icon-btn--badged" type="button" aria-label="Уведомления" data-stub>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
          </svg>
          <span class="notif-count" aria-hidden="true">3</span>
        </button>

        <!-- Avatar (D) + Reputation (§3.7) — combined pill -->
        <a class="avatar-rep" href="account.html" aria-label="Аккаунт — репутация 142" data-stub>
          <span class="avatar-rep__face" aria-hidden="true">АИ</span>
          <span class="avatar-rep__score" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor" aria-hidden="true">
              <path d="M12 2l2.9 6.1 6.6.9-4.8 4.6 1.2 6.6L12 18l-5.9 3.2 1.2-6.6L2.5 9l6.6-.9z"></path>
            </svg>
            <span class="avatar-rep__num">142</span>
          </span>
        </a>
      </div>
    </div>
  </header>

  <!-- ===================================================================
       CONTENT WELL — identical to FramePub; pages replace the placeholder.
       =================================================================== -->
  <main class="site-main" id="content">
    <div class="content-wash" aria-hidden="true"></div>
    <div class="placeholder-card">
      <span class="seal" aria-hidden="true">β<span class="arrow">→</span>α</span>
      <p>Содержимое страницы</p>
      <p class="hint">Здесь будет содержимое — каркас задаёт ритм</p>
    </div>
  </main>

  <!-- ===================================================================
       FOOTER — NOIR band. Delta 4/5: About + Console active links added.
       =================================================================== -->
  <footer class="site-footer" data-band="noir">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="text-mark" aria-hidden="true">β<span class="arrow">→</span>α</span>
          <span class="footer-tagline">© 2026 beta→alpha. Для профессионального сообщества.</span>
        </div>
        <nav class="footer-links" aria-label="Служебные ссылки">
          <a class="footer-link" href="about.html">О проекте</a>
          <a class="footer-link footer-link--console" href="debug-console.html">Консоль</a>
          <span class="build-tag">v0.2.0-primer · frame-user</span>
        </nav>
      </div>
    </div>
  </footer>

  <!-- Nav indicator: unchanged from FramePub — targets .nav-link items,
       suppresses strip when active link is .nav-link-home. -->
  <script>
    (function () {
      var nav = document.querySelector(".primary-nav");
      if (!nav) return;
      var links = Array.prototype.slice.call(nav.querySelectorAll(".nav-link"));
      var strip = nav.querySelector(".nav-strip");
      var dot = nav.querySelector(".nav-dot");
      if (!links.length || !strip || !dot) return;

      var DOT_RADIUS = 3.5; // half of the 7px dot

      function isHome(link) {
        return link.classList.contains("nav-link-home");
      }

      function moveTo(link) {
        var left = link.offsetLeft;
        var width = link.offsetWidth;
        strip.style.left = left + "px";
        strip.style.width = width + "px";
        dot.style.left = left + width / 2 + "px";
        if (isHome(link)) {
          var navBottomToBadgeBottom =
            nav.clientHeight - (link.offsetTop + link.offsetHeight);
          dot.style.bottom = navBottomToBadgeBottom - DOT_RADIUS + "px";
        } else {
          dot.style.bottom = "4px";
        }
      }

      function activeLink() {
        return nav.querySelector('.nav-link[aria-current="page"]') || links[0];
      }

      function syncIndicatorVisibility() {
        strip.style.opacity = isHome(activeLink()) ? "0" : "1";
        dot.style.opacity = "1";
      }

      function place(link, instant) {
        if (instant) {
          strip.style.transition = "none";
          dot.style.transition = "none";
        }
        moveTo(link);
        syncIndicatorVisibility();
        if (instant) {
          void dot.offsetWidth; // flush, then restore the stylesheet transition
          strip.style.transition = "";
          dot.style.transition = "";
        }
      }

      document.fonts.ready.then(function () {
        place(activeLink(), true);
      });

      links.forEach(function (link) {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          links.forEach(function (l) { l.removeAttribute("aria-current"); });
          link.setAttribute("aria-current", "page");
          place(link, false);
        });
      });

      var outerStubs = Array.prototype.slice.call(document.querySelectorAll("[data-stub]"));
      outerStubs.forEach(function(el) {
        if (!nav.contains(el)) {
          el.addEventListener("click", function(e) { e.preventDefault(); });
        }
      });

      window.addEventListener("resize", function () { place(activeLink(), true); });
    })();
  </script>
</body>
</html>
