<!DOCTYPE html>
<html lang="ru" data-theme="sepia-contrast">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookatier — каркас страницы</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles/tokens.css" />

  <style>
    /* ===================================================================
       frame.html — shared chrome. Composition only; all colour / type /
       spacing comes from styles/tokens.css. ONE applied style:
       sepia-contrast (set on <html>), no switcher. This file is the
       spacing-rhythm reference every page inherits: header height,
       container, gutters, content min-height, footer.
       =================================================================== */

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Global paper grain — recessive, fixed, theme-aware opacity */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("assets/backgrounds/monogram-cream.png");
      background-repeat: repeat;
      background-size: 320px;
      opacity: var(--grain-opacity);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: var(--container-max);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    /* Skip link — keyboard accessibility */
    .skip-link {
      position: absolute;
      left: var(--space-4);
      top: calc(var(--space-2) * -8);
      z-index: var(--z-toast);
      background: var(--surface);
      color: var(--ink);
      border: var(--hairline) solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4);
      font-size: var(--fs-small);
      transition: top var(--dur-base) var(--ease-out-quart);
    }
    .skip-link:focus { top: var(--space-2); }

    /* ---- Header (height locked here) -------------------------------- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
      background: color-mix(in srgb, var(--paper) 88%, transparent);
      backdrop-filter: saturate(140%) blur(8px);
      border-bottom: var(--hairline) solid var(--line);
    }
    /* Three-column grid → wordmark left, nav perfectly centered, actions right */
    .header-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: var(--space-4);
      height: var(--header-height);
    }

    /* Header top-left: image-based wordmark (beta→alpha banner logo) */
    .wordmark {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      opacity: 1;
      transition: opacity var(--dur-fast) var(--ease-out-quart);
    }
    .wordmark:hover { opacity: 0.82; }
    .wordmark-img { height: 32px; width: auto; display: block; }

    /* Serif text mark — used in nav home item, footer, placeholder seal */
    .text-mark {
      font-family: var(--font-serif);
      font-size: var(--fs-h1);
      font-weight: var(--fw-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-display);
      line-height: 1;
      display: inline-flex;
      align-items: baseline;
      gap: 0.04em;
      flex-shrink: 0;
      transition: color var(--dur-fast) var(--ease-out-quart);
    }
    .text-mark .arrow { color: var(--accent); }
    .text-mark:hover { color: var(--accent); }

    /* ---- Centered primary nav + shared animated indicator ----------- */
    .primary-nav {
      justify-self: center;
      position: relative;        /* offset parent for the moving indicator */
      display: flex;
      align-items: center;
      gap: var(--space-6);
      padding-bottom: 10px;      /* reserves the band the indicator lives in */
    }
    .nav-link {
      font-family: var(--font-sans);
      font-size: var(--fs-small);
      font-weight: var(--fw-medium);
      letter-spacing: var(--tracking-label);
      color: var(--ink-soft);
      line-height: 1;
      padding-block: var(--space-1);
      transition: color var(--dur-fast) var(--ease-out-quart);
    }
    .nav-link:hover,
    .nav-link[aria-current="page"] { color: var(--accent); }

    /* Home nav item — a β→α badge matching the footer noir mark. The badge
       can't use the data-band="noir" scope, so the noir token values are
       hardcoded here: background #1F1B18, letters #ECE3D6, arrow #D2674A. */
    .nav-link-home {
      font-family: var(--font-serif);
      font-size: var(--fs-body);
      font-weight: var(--fw-semibold);
      letter-spacing: var(--tracking-display);
      /* badge — extra ~3px on the BOTTOM only (top edge unchanged) so the
         dark background gives the straddling dot a little more room below */
      background: #1F1B18;
      color: #ECE3D6;
      padding: var(--space-1) var(--space-3) calc(var(--space-1) + 3px);
      border-radius: var(--radius-md);
      transition: opacity var(--dur-fast) var(--ease-out-quart);
    }
    .nav-link-home .arrow { color: #D2674A; }

    /* Override the base .nav-link hover/active colour rules for this item —
       the badge is always the same; only opacity changes on hover */
    .nav-link-home:hover,
    .nav-link-home[aria-current="page"] {
      color: #ECE3D6;   /* keep cream — not accent */
      opacity: 0.85;
    }
    .nav-link-home:hover .arrow,
    .nav-link-home[aria-current="page"] .arrow {
      color: #D2674A;   /* keep terracotta — not inherit */
    }

    /* Selected-item indicator: line · gap · dot · gap · line.
       A single shared STRIP (a 2px rule with a centered hole) and a single
       shared DOT (thick, interrupting the rule). Both move to the active
       item — the strip SLIDES (ease-out), the dot BOUNCES (spring overshoot,
       the one sanctioned exception to the no-bounce rule). */
    .nav-strip,
    .nav-dot {
      position: absolute;
      pointer-events: none;
    }
    /* The line is terracotta. */
    .nav-strip {
      background: var(--accent);
      bottom: 7px;               /* lifted ~7px → sits about twice as close to the labels */
      height: var(--hairline);   /* thin hairline rule under the side items */
      border-radius: var(--radius-pill);
      /* Cut a centered ~14px window so the dot interrupts the rule */
      -webkit-mask: linear-gradient(90deg,
        #000 0, #000 calc(50% - 7px),
        transparent calc(50% - 7px), transparent calc(50% + 7px),
        #000 calc(50% + 7px), #000 100%);
      mask: linear-gradient(90deg,
        #000 0, #000 calc(50% - 7px),
        transparent calc(50% - 7px), transparent calc(50% + 7px),
        #000 calc(50% + 7px), #000 100%);
      /* The line slides toward the target, but its opacity fades faster than
         it travels — so when switching to the centre badge it disappears
         BEFORE reaching the middle. */
      transition: left 280ms var(--ease-out-quart),
                  width 280ms var(--ease-out-quart),
                  opacity 160ms var(--ease-out-quart);
    }
    /* The dot is amber — a warm orange, distinct from the terracotta line. */
    .nav-dot {
      background: var(--amber);
      bottom: 4px;               /* centers the 7px dot on the lifted 1px strip */
      width: 7px;
      height: 7px;
      border-radius: var(--radius-pill);
      transform: translateX(-50%);
      /* Spring / overshoot on BOTH axes — the dot jumps like a ball and
         bounces into place (the one sanctioned bounce). `bottom` is animated
         so the dot can hop up to straddle the centre badge's lower edge. */
      transition: left 360ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  bottom 360ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* Before JS positions them, keep them invisible to avoid a flash at 0,0 */
    .nav-strip:not([style]),
    .nav-dot:not([style]) { opacity: 0; }

    /* REQUIRED reduced-motion path: no slide, no bounce — instant move */
    @media (prefers-reduced-motion: reduce) {
      .nav-strip,
      .nav-dot { transition: none; }
    }

    .header-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-shrink: 0;
    }
    /* Mobile-only "О проекте" — compensates for the hidden primary-nav */
    .nav-about { display: none; }

    /* ---- Buttons ---------------------------------------------------- */
    .btn {
      font-family: var(--font-sans);
      font-size: var(--fs-small);
      font-weight: var(--fw-medium);
      letter-spacing: var(--tracking-label);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--dur-base) var(--ease-out-quart),
        color var(--dur-base) var(--ease-out-quart),
        border-color var(--dur-base) var(--ease-out-quart),
        transform var(--dur-base) var(--ease-out-quart);
    }
    .btn-ghost {
      background: transparent;
      color: var(--ink-soft);
      border: var(--hairline) solid transparent;
      padding: var(--space-2) var(--space-4);
    }
    .btn-ghost:hover {
      color: var(--ink);
      border-color: var(--line);
    }
    .btn-primary {
      background: var(--accent);
      color: var(--on-accent);
      border: var(--hairline) solid var(--accent);
      padding: var(--space-2) var(--space-6);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: var(--on-accent);
      transform: translateY(-1px);
    }
    /* Softened primary — accent at 88%, just a breath lighter than full.
       Warm lift shadow separates it from the textured grain background. */
    .btn-soft-fill {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-sans);
      font-size: var(--fs-small);
      font-weight: var(--fw-medium);
      line-height: var(--lh-small);
      letter-spacing: var(--tracking-label);
      color: var(--on-accent);
      background: color-mix(in srgb, var(--accent) 88%, var(--paper) 12%);
      border: none;
      border-radius: var(--radius-md);
      text-decoration: none;
      cursor: pointer;
      padding: 9px 24px;
      box-shadow: 0 1px 3px rgba(168,72,47,0.12), 0 4px 12px rgba(168,72,47,0.14);
      transition: background var(--dur-base) var(--ease-out-quart),
        box-shadow var(--dur-base) var(--ease-out-quart),
        transform var(--dur-fast) var(--ease-out-quart);
    }
    .btn-soft-fill:hover {
      color: var(--on-accent);
      background: var(--accent-hover);
      box-shadow: 0 2px 6px rgba(168,72,47,0.18), 0 8px 20px rgba(168,72,47,0.20);
      transform: translateY(-1px);
    }
    @media (prefers-reduced-motion: reduce) {
      .btn-soft-fill { transition: none; transform: none !important; }
    }
    /* Inner cream halo separates accent ring from accent fill on this button */
    .btn-soft-fill:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius-md);
      box-shadow: 0 0 0 2px var(--surface),
                  0 1px 3px rgba(168,72,47,0.12),
                  0 4px 12px rgba(168,72,47,0.14);
    }

    /* Keyboard focus: keep the system terracotta ring, but preserve the
       button's own --radius-md corners (the global :focus-visible rule in
       tokens.css drops to --radius-sm) so corners don't snap on Tab. */
    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius-md);
    }
    /* On the filled primary button the terracotta ring would blend with the
       terracotta fill; a cream (--surface) halo separates fill from ring so
       the focus state reads unambiguously. Static — no transition to gate. */
    .btn-primary:focus-visible {
      box-shadow: 0 0 0 2px var(--surface);
    }

    /* ---- Main content well ------------------------------------------ */
    .site-main {
      position: relative;
      flex: 1;
      display: grid;
      place-items: center;
      padding-block: var(--space-24);
      isolation: isolate;
      background-color: color-mix(in srgb, var(--paper) 80%, var(--surface-sunk) 20%);
      background-image: url("assets/backgrounds/monogram-cream.png");
      background-repeat: repeat;
      background-size: 280px;
      background-blend-mode: multiply;
    }
    /* Recessive content wash — theme-swapped, faded into paper at the edges */
    .content-wash {
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image: var(--wash-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: var(--wash-opacity);
      -webkit-mask-image: radial-gradient(120% 90% at 50% 42%, #000 38%, transparent 88%);
      mask-image: radial-gradient(120% 90% at 50% 42%, #000 38%, transparent 88%);
      pointer-events: none;
    }

    .placeholder-card {
      position: relative;
      z-index: 1;
      text-align: center;
      border: var(--hairline) solid var(--line);
      border-radius: var(--radius-lg);
      background: color-mix(in srgb, var(--surface) 70%, transparent);
      padding: var(--space-16) var(--space-24);
      box-shadow: var(--shadow-soft);
    }
    .placeholder-card .seal {
      font-family: var(--font-serif);
      font-size: var(--fs-h2);
      color: var(--ink-faint);
      display: inline-flex;
      gap: 0.04em;
      margin-bottom: var(--space-4);
    }
    .placeholder-card .seal .arrow { color: var(--accent); }
    .placeholder-card p {
      font-family: var(--font-sans);
      font-size: var(--fs-small);
      letter-spacing: var(--tracking-label);
      color: var(--ink-soft);
    }
    .placeholder-card .hint {
      margin-top: var(--space-2);
      font-size: var(--fs-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--ink-soft); /* readable text → ink-soft, not ink-faint (Ink-Faint Rule) */
    }

    /* ---- Footer — menu-free NOIR band (proportions locked here) ----- */
    .site-footer {
      position: relative;
      z-index: 1;
      background: var(--paper);   /* noir scope swaps this to warm near-black */
      border-top: var(--hairline) solid var(--line);
    }
    .footer-inner {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-4);
      padding-block: var(--space-8);
    }
    .footer-brand {
      display: flex;
      align-items: baseline;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .footer-brand .text-mark { font-size: var(--fs-h2); }
    .footer-tagline {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--ink-soft);
    }
    .build-tag {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--ink-soft);
    }

    /* ---- Responsive: degrade gracefully (desktop-first) ------------- */
    @media (max-width: 760px) {
      .primary-nav { display: none; }
      .nav-about { display: inline-flex; }
      :root { --gutter: var(--space-6); }
      .placeholder-card { padding: var(--space-12) var(--space-8); }
    }
    @media (max-width: 460px) {
      /* Desktop-first chrome degrades to fit small screens without overflow */
      .header-inner { gap: var(--space-3); }
      .header-actions { gap: var(--space-2); }
      /* О проекте stays; Войти ghost hides (users reach login via Регистрация flow) */
      .header-actions > .btn-ghost:not(.nav-about) { display: none; }
      .btn-ghost { padding: var(--space-2) var(--space-3); }
      .btn-primary { padding: var(--space-2) var(--space-4); }
    }
  </style>
</head>

<body>
  <a class="skip-link" href="#content">К содержимому</a>

  <!-- ===================================================================
       HEADER — anonymous frame (site-map.md v2.0 §3)
       Wordmark · centered public nav (О проекте · β→α home · Новости) ·
       Войти / Регистрация. Nav targets are visual stubs this session;
       the indicator is wired to demonstrate its motion on click.
       =================================================================== -->
  <header class="site-header">
    <div class="header-inner container">
      <a class="wordmark" href="index.html" aria-label="beta→alpha — на главную">
        <img class="wordmark-img" src="assets/decor/a2b-logo.png" alt="beta→alpha">
      </a>

      <nav class="primary-nav" aria-label="Основная навигация">
        <a class="nav-link" href="about.html">О проекте</a>
        <a class="nav-link nav-link-home" href="index.html" aria-label="Главная" aria-current="page">β<span class="arrow">→</span>α</a>
        <a class="nav-link" href="#pass-2" data-stub>Новости</a>

        <!-- Shared selected-item indicator: strip (slides) + dot (bounces) -->
        <span class="nav-strip" aria-hidden="true"></span>
        <span class="nav-dot" aria-hidden="true"></span>
      </nav>

      <div class="header-actions">
        <a class="btn btn-ghost nav-about" href="about.html">О проекте</a>
        <a class="btn btn-ghost" href="#pass-2" data-stub>Войти</a>
        <a class="btn-soft-fill" href="#pass-2" data-stub>Регистрация</a>
      </div>
    </div>
  </header>

  <!-- ===================================================================
       CONTENT WELL — empty <main> filling the space between header and
       footer, with a recessive theme-swapped background wash. Pages
       replace the placeholder card with real content.
       =================================================================== -->
  <main class="site-main" id="content">
      <div class="content-wash" aria-hidden="true"></div>
      <div class="placeholder-card">
        <span class="seal" aria-hidden="true">β<span class="arrow">→</span>α</span>
        <p>Содержимое страницы</p>
        <p class="hint">Здесь будет содержимое — каркас задаёт ритм</p>
      </div>
    </main>

  <!-- ===================================================================
       FOOTER — menu-free NOIR band (site-map.md v2.0 §3). Demonstrates the
       sepia→noir cadence at the bottom of every page. Only the β→α line +
       build tag; no link menu. Proportions locked here.
       =================================================================== -->
  <footer class="site-footer" data-band="noir">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="text-mark" aria-hidden="true">β<span class="arrow">→</span>α</span>
          <span class="footer-tagline">© 2026 beta→alpha. Для профессионального сообщества.</span>
        </div>
        <span class="build-tag">v0.2.0-primer · frame</span>
      </div>
    </div>
  </footer>

  <!-- Tiny inline script (the only application JS allowed here): positions
       and animates the shared nav indicator. The strip slides, the dot
       bounces. Targets are stubs in the frame → preventDefault so the
       motion is demonstrable without leaving the page. -->
  <script>
    (function () {
      var nav = document.querySelector(".primary-nav");
      if (!nav) return;
      var links = Array.prototype.slice.call(nav.querySelectorAll(".nav-link"));
      var strip = nav.querySelector(".nav-strip");
      var dot = nav.querySelector(".nav-dot");
      if (!links.length || !strip || !dot) return;

      var DOT_RADIUS = 3.5; // half of the 7px dot

      function isHome(link) {
        return link.classList.contains("nav-link-home");
      }

      // Position the strip and dot under a link. The strip always tracks the
      // target horizontally. The dot rides the strip under a side item, but on
      // the centre badge it straddles the badge's lower edge — top half over
      // the dark background, bottom half below it — horizontally centred.
      function moveTo(link) {
        var left = link.offsetLeft;
        var width = link.offsetWidth;
        strip.style.left = left + "px";
        strip.style.width = width + "px";
        dot.style.left = left + width / 2 + "px";
        if (isHome(link)) {
          var navBottomToBadgeBottom =
            nav.clientHeight - (link.offsetTop + link.offsetHeight);
          dot.style.bottom = navBottomToBadgeBottom - DOT_RADIUS + "px";
        } else {
          dot.style.bottom = "4px"; // centred on the lifted 1px strip
        }
      }

      function activeLink() {
        return nav.querySelector('.nav-link[aria-current="page"]') || links[0];
      }

      // The dot marks every selection. The line shows only under the side
      // items; on the centre badge it fades out (timing handled in CSS).
      function syncIndicatorVisibility() {
        strip.style.opacity = isHome(activeLink()) ? "0" : "1";
        dot.style.opacity = "1";
      }

      // Place the indicator, optionally without animation (initial paint and
      // layout reflows should snap, not animate).
      function place(link, instant) {
        if (instant) {
          strip.style.transition = "none";
          dot.style.transition = "none";
        }
        moveTo(link);
        syncIndicatorVisibility();
        if (instant) {
          void dot.offsetWidth; // flush, then restore the stylesheet transition
          strip.style.transition = "";
          dot.style.transition = "";
        }
      }

      // Default under the active item. Wait for fonts so the serif badge width
      // is final before measuring offsetWidth; place it instantly (no fly-in).
      document.fonts.ready.then(function () {
        place(activeLink(), true);
      });

      links.forEach(function (link) {
        link.addEventListener("click", function (e) {
          e.preventDefault(); // stub targets — keep the page so motion is visible
          links.forEach(function (l) { l.removeAttribute("aria-current"); });
          link.setAttribute("aria-current", "page");
          place(link, false); // animated: dot bounces, line slides then fades
        });
      });

      // Prevent stub links outside the nav from appending the hash to the URL.
      var outerStubs = Array.prototype.slice.call(document.querySelectorAll("[data-stub]"));
      outerStubs.forEach(function(el) {
        if (!nav.contains(el)) {
          el.addEventListener("click", function(e) { e.preventDefault(); });
        }
      });

      // Keep the indicator aligned if the layout reflows.
      window.addEventListener("resize", function () { place(activeLink(), true); });
    })();
  </script>
</body>
</html>
