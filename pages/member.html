<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Участник — β→α академия</title>
  <!-- ============================================================================
       member.html — the Member entity-card page (the card given the full content
       area; system-model §4.3). Dynamic by ?member=<id> (also accepts ?user=).
       Feature areas: 12 (Members & Community) · 9 (Reputation) · 13 (Following).
       Spec refs: specs §1.2 (Member/PublicProfile), §1.3/§3.2 (XP→Rank), §1.14
       (Track), §2 (member events). Consumes BA.store (publicProfileOf, memberEvents,
       reactionsFor, isTracking/addTrack). Viewing is open; Track/Message gated
       (CON-01). Tokens-only. -->
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/chrome.css">
  <style>
    .me-main { min-height: 100vh; }
    .me-wrap { max-width: 920px; margin: 0 auto; padding: 0 var(--gutter, 40px); }
    @media (max-width: 700px){ .me-wrap { padding: 0 var(--space-4, 16px); } }
    .me-hero { display: flex; align-items: center; gap: var(--space-6, 24px); padding: var(--space-12, 48px) 0 var(--space-8, 32px); flex-wrap: wrap; }
    .me-av { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--line); background: var(--surface-sunk); flex-shrink: 0; }
    .me-hero-text { min-width: 0; flex: 1; }
    .me-eyebrow { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin: 0 0 var(--space-2, 8px); }
    .me-name { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; color: var(--ink); margin: 0; letter-spacing: -0.01em; }
    .me-meta { font-family: var(--font-sans); font-size: var(--fs-body, 16px); color: var(--ink-soft); margin: var(--space-2, 8px) 0 0; }
    .me-badges { display: flex; align-items: center; gap: var(--space-2, 8px); flex-wrap: wrap; margin: var(--space-3, 12px) 0 0; }
    .role-badge { display: inline-flex; align-items: center; font-family: var(--font-sans); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 8px; border-radius: var(--radius-pill, 999px); border: var(--hairline) solid var(--line); color: var(--ink-soft); }
    .role-badge--pro { color: var(--sage); border-color: var(--sage); }
    .role-badge--mod { color: var(--slate); border-color: var(--slate); }
    .role-badge--adm { color: var(--accent); border-color: var(--accent); }
    .rep-pill { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: 600; padding: 4px 11px; border-radius: var(--radius-pill, 999px); border: var(--hairline) solid var(--line); color: var(--amber); font-variant-numeric: tabular-nums; }
    .me-actions { margin-top: var(--space-4, 16px); display: flex; gap: var(--space-2, 8px); flex-wrap: wrap; }
    .me-btn { font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: 600; padding: 9px 18px; border-radius: var(--radius-pill, 999px); cursor: pointer; border: var(--hairline) solid var(--line); background: var(--surface); color: var(--ink-soft); transition: all 140ms; }
    .me-btn--track { background: var(--accent); color: var(--on-accent, #fff); border-color: var(--accent); }
    .me-btn--track.is-on { background: var(--surface); color: var(--accent); }
    .me-btn:hover:not(:disabled) { border-color: var(--accent); }
    .me-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .me-sec { padding: var(--space-8, 32px) 0; border-top: var(--hairline) solid var(--line); }
    .me-sec-title { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); margin: 0 0 var(--space-4, 16px); }
    .me-bio { font-family: var(--font-serif); font-size: var(--fs-h3, 18px); line-height: 1.7; color: var(--ink); max-width: 68ch; margin: 0; }
    .me-stats { display: flex; gap: var(--space-8, 32px); flex-wrap: wrap; }
    .me-stat-val { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 600; color: var(--ink); display: block; }
    .me-stat-lbl { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.04em; }
    .me-react { border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface); padding: var(--space-4, 16px); margin-bottom: var(--space-3, 12px); }
    .me-react-head { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); margin: 0 0 var(--space-2); }
    .me-react-head a { color: var(--accent); text-decoration: none; }
    .me-react-text { font-family: var(--font-serif); font-size: var(--fs-body, 16px); line-height: 1.6; color: var(--ink); margin: 0; }
    .me-empty { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-faint); font-style: italic; margin: 0; }
    .me-activity { list-style: none; padding: 0; margin: 0; }
    .me-act-item { display: flex; gap: var(--space-3, 12px); padding: var(--space-3, 12px) 0; border-bottom: var(--hairline) solid var(--line); font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-soft); }
    .me-act-item:last-child { border-bottom: none; }
    .me-act-when { margin-left: auto; color: var(--ink-faint); white-space: nowrap; }
    .me-loading { font-family: var(--font-sans); color: var(--ink-faint); padding: var(--space-16, 64px); text-align: center; }
  </style>
</head>
<body>
  <main id="main-content" data-page-body class="me-main">
    <div class="me-wrap" id="me-root"><div class="me-loading">Загрузка…</div></div>
  </main>

  <script src="../components/session.js"></script>
  <script src="../components/book-data.js"></script>
  <script src="../components/author-data.js"></script>
  <script src="../components/publisher-data.js"></script>
  <script src="../components/member-data.js"></script>
  <script src="../components/store.js"></script>
  <script src="../components/sim.js"></script>
  <script src="../components/frame.js?v=4"></script>
  <script src="../components/avatar-menu.js"></script>
  <script src="../components/notifications.js"></script>
  <script src="../components/search.js"></script>
  <script src="../components/pulse.js"></script>
  <script src="../components/debug.js"></script>
  <script src="../components/registration.js"></script>
  <script src="../components/demo.js"></script>

  <script>
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    var ST = function(){ return window.BA.store; };
    var params = new URLSearchParams(location.search);
    var id = params.get('member') || params.get('user') || 'u2';

    function bookTitle(slug){ var b = BA.bookData.get(slug); return b?b.title:slug; }
    function timeAgo(iso){ if(!iso) return ''; var s=Math.floor((Date.now()-new Date(iso).getTime())/1000); if(s<60)return 'только что'; var m=Math.floor(s/60); if(m<60)return m+' мин. назад'; var h=Math.floor(m/60); if(h<24)return h+' ч. назад'; var d=Math.floor(h/24); if(d<30)return d+' дн. назад'; return new Date(iso).toLocaleDateString('ru-RU'); }
    function roleBadges(pp){
      var b='';
      if (pp.role==='Admin') b+='<span class="role-badge role-badge--adm">Администратор</span>';
      else if (pp.role==='Moderator') b+='<span class="role-badge role-badge--mod">Модератор</span>';
      if (pp.privileges.indexOf('Verified')>=0) b+='<span class="role-badge role-badge--pro">Профессионал</span>';
      return b;
    }

    function build(){
      var m = ST().memberRecord(id);
      if (!m || m.kind!=='human'){ document.getElementById('me-root').innerHTML = '<div class="me-loading">Участник не найден. <a href="community.html?tab=member-board">К участникам →</a></div>'; return; }
      var pp = ST().publicProfileOf(id);
      document.title = pp.displayName + ' — β→α академия';
      var av = BA.memberData.avatar(m);
      var priv = BA.session.isPrivate();
      var isSelf = ST().activeId()===id;
      var tracking = ST().isTracking('member', id);
      var stats = ST().readingStats(id);
      var authored = ST().find('reactions', function(r){ return r.authorId===id && (r.form==='comment'||r.form==='review') && !r.deleted; })
        .sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); }).slice(0,6);
      var events = ST().memberEvents(id).slice(0,8);

      var metaBits = [m.title, m.specialisation, m.affiliation].filter(Boolean).map(esc).join(' · ');
      var reactsHTML = authored.length ? authored.map(function(r){
        return '<div class="me-react"><p class="me-react-head">'+(r.form==='review'?'Рецензия':'Комментарий')+' · о книге «<a href="book.html?book='+esc(r.targetId)+'">'+esc(bookTitle(r.targetId))+'</a>» · '+esc(timeAgo(r.createdAt))+'</p>' +
          '<p class="me-react-text">'+esc(r.piece?r.piece.text:'')+'</p></div>';
      }).join('') : '<p class="me-empty">Пока нет публичных реакций.</p>';
      var actHTML = events.length ? '<ul class="me-activity">'+events.map(function(e){
        var c=e.action.codename, w=e.with_what;
        var label = c==='comment.created'?'Прокомментировал(а) «'+esc(bookTitle(w&&w.entity_id))+'»'
          : c==='review.created'?'Написал(а) рецензию на «'+esc(bookTitle(w&&w.entity_id))+'»'
          : c==='shelf.status.changed'?'Обновил(а) полку'
          : c==='vote.cast'?'Проголосовал(а)' : c;
        return '<li class="me-act-item"><span>'+label+'</span><span class="me-act-when">'+esc(timeAgo(e.timestamp))+'</span></li>';
      }).join('')+'</ul>' : '<p class="me-empty">Активности пока нет.</p>';

      document.getElementById('me-root').innerHTML =
        '<section class="me-hero">' +
          '<img class="me-av" src="'+esc(av)+'" alt="Аватар: '+esc(pp.displayName)+'">' +
          '<div class="me-hero-text">' +
            '<p class="me-eyebrow">Участник'+(isSelf?' · это вы':'')+'</p>' +
            '<h1 class="me-name">'+esc(pp.displayName)+'</h1>' +
            (metaBits?'<p class="me-meta">'+metaBits+'</p>':'') +
            '<div class="me-badges">'+roleBadges(pp)+'<span class="rep-pill">★ '+pp.reputationScore+' · '+esc(pp.rank)+'</span></div>' +
            '<div class="me-actions">' +
              (isSelf ? '<a class="me-btn me-btn--track" href="cabinet.html?tab=profile">Редактировать профиль</a>' :
                '<button class="me-btn me-btn--track'+(tracking?' is-on':'')+'" type="button" data-act="track"'+(priv?'':' disabled')+'>'+(tracking?'✓ Вы следите':'+ Следить')+'</button>' +
                '<button class="me-btn" type="button" data-act="msg"'+(priv?'':' disabled')+'>✉ Написать</button>') +
            '</div>' +
          '</div>' +
        '</section>' +
        (m.bio?'<section class="me-sec"><p class="me-sec-title">О себе</p><p class="me-bio">'+esc(m.bio)+'</p></section>':'') +
        '<section class="me-sec"><p class="me-sec-title">Активность</p><div class="me-stats">' +
          '<div><span class="me-stat-val">'+stats.comments+'</span><span class="me-stat-lbl">комментариев</span></div>' +
          '<div><span class="me-stat-val">'+stats.reviews+'</span><span class="me-stat-lbl">рецензий</span></div>' +
          '<div><span class="me-stat-val">'+stats.sessions+'</span><span class="me-stat-lbl">сессий чтения</span></div>' +
          '<div><span class="me-stat-val">'+pp.reputationScore+'</span><span class="me-stat-lbl">репутация</span></div>' +
        '</div></section>' +
        '<section class="me-sec"><p class="me-sec-title">Публичные реакции</p>'+reactsHTML+'</section>' +
        '<section class="me-sec"><p class="me-sec-title">Недавняя активность</p>'+actHTML+'</section>';

      document.getElementById('me-root').addEventListener('click', function(e){
        var act = e.target.closest('[data-act]'); if (!act) return;
        var t = act.getAttribute('data-act');
        if (!BA.session.isPrivate()){ BA.frame.openLogin(); return; }
        if (t==='track'){
          if (ST().isTracking('member', id)) ST().removeTrack({ target:{type:'member', id:id} });
          else ST().addTrack({ target:{type:'member', id:id}, strength:'strong', origin:'explicit' });
          build();
        } else if (t==='msg'){
          ST().sendMessage({ recipientId:id, text:'' });
          location.href = 'cabinet.html?tab=correspondence';
        }
      });
    }

    document.addEventListener('DOMContentLoaded', function(){
      BA.frame.init({ page: 'community' });
      if (BA.sim) BA.sim.ensure();
      build();
      document.addEventListener('ba:session-change', build);
    });
  </script>
</body>
</html>
