<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevDoc · Entity model — β→α</title>
  <!-- DevDoc (feature area X). Generated view over the entity model (system-model
       §1/§3, specs §1). Live counts pulled from BA.store. Tokens-only. -->
  <link rel="stylesheet" href="../styles/tokens.css"><link rel="stylesheet" href="../styles/chrome.css">
  <style>
    .dd-wrap{max-width:880px;margin:0 auto;padding:var(--space-8,32px) var(--gutter,40px) var(--space-16);}
    .dd-eyebrow{font-family:var(--font-sans);font-size:var(--fs-caption,12px);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin:0 0 var(--space-1);}
    .dd-title{font-family:var(--font-serif);font-size:2rem;font-weight:600;color:var(--ink);margin:0 0 var(--space-2);}
    .dd-sub{font-family:var(--font-sans);font-size:var(--fs-small,14px);color:var(--ink-soft);margin:0 0 var(--space-6);max-width:62ch;}
    .dd-nav{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-6);}
    .dd-nav a{font-family:var(--font-sans);font-size:var(--fs-small,14px);padding:6px 14px;border-radius:var(--radius-pill,999px);border:var(--hairline) solid var(--line);color:var(--ink-soft);text-decoration:none;}
    .dd-nav a:hover,.dd-nav a.is-on{border-color:var(--accent);color:var(--accent);}
    .dd-sec{border-top:var(--hairline) solid var(--line);padding:var(--space-6) 0;}
    .dd-sec h2{font-family:var(--font-serif);font-size:var(--fs-h3,18px);color:var(--ink);margin:0 0 var(--space-3);}
    .dd-mains{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4);}
    @media(max-width:680px){.dd-mains{grid-template-columns:1fr;}}
    .dd-main{border:var(--hairline) solid var(--line);border-radius:var(--radius-md,10px);background:var(--surface);padding:var(--space-5);}
    .dd-main h3{font-family:var(--font-serif);font-size:var(--fs-h3,18px);color:var(--ink);margin:0 0 4px;}
    .dd-main p{font-family:var(--font-sans);font-size:var(--fs-small,14px);color:var(--ink-soft);margin:0;line-height:1.5;}
    .dd-main .c{color:var(--accent);font-weight:600;}
    .dd-row{display:flex;gap:var(--space-3);padding:var(--space-2) 0;font-family:var(--font-sans);font-size:var(--fs-small,14px);color:var(--ink-soft);border-bottom:var(--hairline) solid var(--line);}
    .dd-row:last-child{border-bottom:none;}.dd-k{min-width:170px;font-weight:600;color:var(--ink);}
    pre{font-family:var(--font-mono,ui-monospace,monospace);font-size:12px;color:var(--ink-soft);background:var(--surface-sunk);padding:var(--space-4);border-radius:var(--radius-md,10px);overflow-x:auto;line-height:1.5;}
  </style>
</head>
<body>
  <main id="main-content" data-page-body><div class="dd-wrap">
    <p class="dd-eyebrow">DevDoc</p><h1 class="dd-title">Модель сущностей</h1>
    <p class="dd-sub">Четыре главные сущности и два коннектора (system-model §1/§8). Формальные шкафы полей — specs §1; правила голосов/рейтинга — §3. Счётчики ниже — живые из BA.store.</p>
    <nav class="dd-nav"><a href="dev-ux.html">UX</a><a href="dev-components.html">Компоненты</a><a href="dev-features.html">Фичи</a><a href="dev-model.html" class="is-on">Модель</a></nav>
    <div id="dd-body"></div>
  </div></main>
  <script src="../components/session.js"></script><script src="../components/book-data.js"></script>
  <script src="../components/author-data.js"></script><script src="../components/publisher-data.js"></script>
  <script src="../components/member-data.js"></script><script src="../components/store.js"></script>
  <script src="../components/sim.js"></script><script src="../components/frame.js?v=5"></script>
  <script src="../components/avatar-menu.js"></script><script src="../components/notifications.js"></script>
  <script src="../components/search.js"></script><script src="../components/pulse.js"></script>
  <script src="../components/debug.js"></script><script src="../components/registration.js"></script><script src="../components/demo.js"></script>
  <script>
    function row(k,v){ return '<div class="dd-row"><span class="dd-k">'+k+'</span><span>'+v+'</span></div>'; }
    var MAINS=[
      ['Member','мир: Community','Зарегистрированный человек — автор Reactions, носитель standing (XP→Rank). Подмножество: Reading Club.'],
      ['Publication','мир: Catalogue','Опубликованная работа (книга-идентичность). Владеет Editions. Подмножество: Collection.'],
      ['Author','мир: Pantheon','Автор работ — референс-персона, не Member. Цель Reaction/Track.'],
      ['Publisher','мир: Producers','Правообладатель + «голос Ресурса» (β→α). publisher_id — внутренняя константа.']
    ];
    document.addEventListener('DOMContentLoaded',function(){ BA.frame.init({page:'dev-model'});
      var st=BA.store;
      var counts = st ? row('members', Object.keys(st.mapOf('members')).length)+row('reactions (Vote/Comment/Review/Reply/Message)', st.all('reactions').length)+row('events (append-only)', st.all('events').length)+row('excerpts', st.all('excerpts').length)+row('tracks', st.all('tracks').length)+row('chats', st.all('chats').length)+row('clubs (seeded UI)', 3) : '';
      document.getElementById('dd-body').innerHTML =
        '<section class="dd-sec"><h2>Четыре главные сущности</h2><div class="dd-mains">'+MAINS.map(function(m){return '<div class="dd-main"><h3>'+m[0]+'</h3><p class="c">'+m[1]+'</p><p>'+m[2]+'</p></div>';}).join('')+'</div></section>'+
        '<section class="dd-sec"><h2>Коннекторы</h2>'+
          row('Reaction','связывает target → авторствующего Member; форма = Vote и/или Piece_of_Mind (≥1): Vote · Comment · Review(Comment+Vote, Pro-only) · Reply · Message')+
          row('Track','follow/hide любой main (+mute/block для Members); strength weak/strong')+
        '</section>'+
        '<section class="dd-sec"><h2>Standing (specs §3)</h2>'+
          row('Reputation','хранимый XP (только полученные голосы); сам по себе ничего не даёт')+
          row('Rank','derived из XP (tierOf): Новичок ×1 · Практик ×2 · Эксперт ×3 · Мэтр ×5')+
          row('effective_weight','rankMult × (Verified?proFactor:1) × targetCoeff')+
          row('Book rating','α·взвеш.рецензии + (1−α)·голоса (α=0.8, review ×3)')+
        '</section>'+
        '<section class="dd-sec"><h2>Event envelope (specs §1.15/§2.1)</h2><pre>{ id, action_id, timestamp,\n  who:{entity,entity_id},\n  action:{ codename, params:{ actor:{role,rank,effective_weight}, ... } },\n  with_what:{entity,entity_id}|null,\n  visibility: public|self|targeted,\n  source: real|sim,\n  publisher_id: "beta-alpha" }</pre>'+
          '<p class="dd-sub" style="margin-top:var(--space-3)">Одно действие → один-или-более events с общим action_id (vote.cast → reputation.changed).</p></section>'+
        '<section class="dd-sec"><h2>Живые счётчики (BA.store)</h2>'+counts+'</section>';
    });
  </script>
</body>
</html>
