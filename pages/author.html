<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Автор — β→α академия</title>
  <!-- Author page = the Author card given the full content area (the same entity,
       more room; system-model §4.3). Dynamic by ?author=<id>.
       Feature area: Pantheon · Author card. Spec refs: specs.md §1.5 (Author),
       principle 7 (authors receive community-display reactions). Social reactions
       left empty this round. Tokens-only. -->
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/chrome.css">
  <style>
    /* No padding-top: the sticky .site-header already reserves its height (B1). */
    .au-main { min-height: 100vh; }
    .au-wrap { max-width: 920px; margin: 0 auto; padding: 0 var(--gutter, 40px); }
    @media (max-width: 700px){ .au-wrap { padding: 0 var(--space-4, 16px); } }
    /* Hero */
    .au-hero { display: flex; align-items: center; gap: var(--space-6, 24px); padding: var(--space-12, 48px) 0 var(--space-8, 32px); flex-wrap: wrap; }
    .au-portrait { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--line);
      background: var(--surface-sunk); flex-shrink: 0; }
    .au-hero-text { min-width: 0; flex: 1; }
    .au-eyebrow { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--accent); margin: 0 0 var(--space-2, 8px); }
    .au-name { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; color: var(--ink); margin: 0; letter-spacing: -0.01em; }
    .au-meta { font-family: var(--font-sans); font-size: var(--fs-body, 16px); color: var(--ink-soft); margin: var(--space-2, 8px) 0 0; }
    .au-hero-actions { margin-top: var(--space-4, 16px); display: flex; gap: var(--space-2, 8px); }
    .au-btn { font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: 600; padding: 9px 18px; border-radius: var(--radius-pill, 999px);
      cursor: pointer; border: var(--hairline) solid var(--line); background: var(--surface); color: var(--ink-soft); transition: all 140ms; }
    .au-btn--track { background: var(--accent); color: var(--on-accent, #fff); border-color: var(--accent); }
    .au-btn--track.is-on { background: var(--surface); color: var(--accent); }
    .au-btn:hover { border-color: var(--accent); }
    /* Sections */
    .au-sec { padding: var(--space-8, 32px) 0; border-top: var(--hairline) solid var(--line); }
    .au-sec-title { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--ink-faint); margin: 0 0 var(--space-4, 16px); }
    .au-bio { font-family: var(--font-serif); font-size: var(--fs-h3, 18px); line-height: 1.7; color: var(--ink); max-width: 68ch; margin: 0; }
    .au-focus { display: flex; flex-wrap: wrap; gap: var(--space-2, 8px); }
    .au-focus-chip { font-family: var(--font-sans); font-size: var(--fs-small, 14px); padding: 7px 14px; border-radius: var(--radius-pill, 999px);
      background: var(--surface-sunk); color: var(--ink-soft); }
    /* Works grid */
    .au-works { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4, 16px); }
    @media (max-width: 600px){ .au-works { grid-template-columns: 1fr; } }
    .au-work { display: flex; gap: var(--space-4, 16px); padding: var(--space-4, 16px); align-items: center;
      border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface);
      text-decoration: none; transition: border-color 140ms, box-shadow 140ms; }
    .au-work:hover { border-color: var(--accent); box-shadow: var(--shadow-soft); }
    .au-work-cover { width: 56px; height: 80px; object-fit: cover; border-radius: var(--radius-sm, 6px); flex-shrink: 0;
      border: var(--hairline) solid var(--line); background: var(--surface-sunk); }
    .au-work-info { min-width: 0; flex: 1; }
    .au-work-title { font-family: var(--font-serif); font-size: var(--fs-body, 16px); font-weight: 600; color: var(--ink); margin: 0; line-height: 1.3; }
    .au-work-sub { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); margin: 4px 0 0; }
    .au-work-arrow { color: var(--accent); font-size: 16px; align-self: center; flex-shrink: 0; }
    .au-empty { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-faint); font-style: italic; margin: 0; }
    .au-loading { font-family: var(--font-sans); color: var(--ink-faint); padding: var(--space-16, 64px); text-align: center; }
  </style>
</head>
<body>
  <main id="main-content" data-page-body class="au-main">
    <div class="au-wrap" id="au-root"><div class="au-loading">Загрузка…</div></div>
  </main>

  <script src="../components/session.js"></script>
  <script src="../components/member-data.js"></script>
  <script src="../components/store.js"></script>
  <script src="../components/sim.js"></script>
  <script src="../components/frame.js?v=4"></script>
  <script src="../components/avatar-menu.js"></script>
  <script src="../components/notifications.js"></script>
  <script src="../components/search.js"></script>
  <script src="../components/pulse.js"></script>
  <script src="../components/debug.js"></script>
  <script src="../components/demo.js"></script>
  <script src="../components/registration.js"></script>
  <script src="../components/book-data.js"></script>
  <script src="../components/author-data.js"></script>
  <script src="../components/reader-engine.js"></script>
  <script src="../components/book-card.js"></script>
  <script src="../components/member-card.js"></script>
  <script src="../components/author-card.js"></script>

  <script>
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    var id = new URLSearchParams(location.search).get('author') || 'author-bion';

    function build(){
      var a = BA.authorData.get(id);
      if (!a){ document.getElementById('au-root').innerHTML = '<div class="au-loading">Автор не найден. <a href="library.html?tab=pantheon">В пантеон →</a></div>'; return; }
      document.title = a.name + ' — β→α академия';
      var av = (window.BA && BA.avatars) ? BA.avatars.pick(a.name) : '';
      var works = BA.authorData.worksOf(a);
      var priv = !!(window.BA && BA.session && BA.session.isPrivate());

      var worksHTML = works.map(function(w){
        return '<a class="au-work" href="book.html?book='+esc(w.slug)+'">' +
          '<img class="au-work-cover" src="'+esc(w.cover)+'" alt="Обложка: '+esc(w.title)+'" loading="lazy">' +
          '<span class="au-work-info"><p class="au-work-title">'+esc(w.title)+'</p><p class="au-work-sub">'+esc(w.sub)+'</p></span>' +
          '<span class="au-work-arrow">→</span>' +
        '</a>';
      }).join('');

      var focusHTML = (a.focus||[]).map(function(f){ return '<span class="au-focus-chip">'+esc(f)+'</span>'; }).join('');

      document.getElementById('au-root').innerHTML =
        '<section class="au-hero">' +
          (av?'<img class="au-portrait" src="'+esc(av)+'" alt="Портрет: '+esc(a.name)+'">':'') +
          '<div class="au-hero-text">' +
            '<p class="au-eyebrow">Автор</p>' +
            '<h1 class="au-name">'+esc(a.name)+'</h1>' +
            '<p class="au-meta">'+esc(a.meta)+(a.role?' · '+esc(a.role):'')+'</p>' +
            '<div class="au-hero-actions">' +
              '<button class="au-btn au-btn--track" type="button" data-act="track">+ Следить</button>' +
              '<button class="au-btn" type="button" data-act="card">Карточка автора</button>' +
            '</div>' +
          '</div>' +
        '</section>' +
        '<section class="au-sec"><p class="au-sec-title">Об авторе</p><p class="au-bio">'+esc(a.bio)+'</p></section>' +
        (focusHTML?'<section class="au-sec"><p class="au-sec-title">В фокусе</p><div class="au-focus">'+focusHTML+'</div></section>':'') +
        '<section class="au-sec"><p class="au-sec-title">Книги в библиотеке ('+works.length+')</p><div class="au-works">'+worksHTML+'</div></section>' +
        '<section class="au-sec"><p class="au-sec-title">Реакции сообщества</p>' +
          '<p class="au-empty">'+(priv?'Голоса и реакции на автора (community-display, принцип 7) появятся здесь.':'Войдите, чтобы видеть и оставлять реакции сообщества (CON-01).')+'</p>' +
        '</section>';

      document.getElementById('au-root').addEventListener('click', function(e){
        var act = e.target.closest('[data-act]'); if (!act) return;
        var t = act.getAttribute('data-act');
        if (t==='track'){ act.classList.toggle('is-on'); act.textContent = act.classList.contains('is-on') ? '✓ Вы следите' : '+ Следить'; }
        else if (t==='card'){ if (BA.authorCard) BA.authorCard.open(id); }
      });
    }

    document.addEventListener('DOMContentLoaded', function(){
      BA.frame.init({ page: 'library', subpage: 'author' });
      build();
      document.addEventListener('ba:session-change', build);
    });
  </script>
</body>
</html>
