<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevDoc · Site structure — β→α</title>
  <!-- DevDoc (feature area X, via Console). Generated view over the site structure
       (system-model §4). Tokens-only. -->
  <link rel="stylesheet" href="../styles/tokens.css"><link rel="stylesheet" href="../styles/chrome.css">
  <style>
    .dd-wrap{max-width:880px;margin:0 auto;padding:var(--space-8,32px) var(--gutter,40px) var(--space-16);}
    .dd-eyebrow{font-family:var(--font-sans);font-size:var(--fs-caption,12px);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin:0 0 var(--space-1);}
    .dd-title{font-family:var(--font-serif);font-size:2rem;font-weight:600;color:var(--ink);margin:0 0 var(--space-2);}
    .dd-sub{font-family:var(--font-sans);font-size:var(--fs-small,14px);color:var(--ink-soft);margin:0 0 var(--space-6);max-width:60ch;}
    .dd-nav{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-6);}
    .dd-nav a{font-family:var(--font-sans);font-size:var(--fs-small,14px);padding:6px 14px;border-radius:var(--radius-pill,999px);border:var(--hairline) solid var(--line);color:var(--ink-soft);text-decoration:none;}
    .dd-nav a:hover,.dd-nav a.is-on{border-color:var(--accent);color:var(--accent);}
    .dd-sec{border-top:var(--hairline) solid var(--line);padding:var(--space-6) 0;}
    .dd-sec h2{font-family:var(--font-serif);font-size:var(--fs-h3,18px);color:var(--ink);margin:0 0 var(--space-3);}
    .dd-row{display:flex;gap:var(--space-3);padding:var(--space-2) 0;font-family:var(--font-sans);font-size:var(--fs-small,14px);color:var(--ink-soft);border-bottom:var(--hairline) solid var(--line);}
    .dd-row:last-child{border-bottom:none;}
    .dd-k{min-width:200px;font-weight:600;color:var(--ink);}
    .dd-k a{color:var(--accent);text-decoration:none;}
    code{font-family:var(--font-mono,ui-monospace,monospace);font-size:12px;color:var(--accent);}
  </style>
</head>
<body>
  <main id="main-content" data-page-body><div class="dd-wrap">
    <p class="dd-eyebrow">DevDoc</p><h1 class="dd-title">Структура сайта (UX)</h1>
    <p class="dd-sub">Сгенерированный обзор трёхуровневой композиции (system-model §4.1/§4.8): мастер-фрейм → секция-фрейм → таб; плюс entity-card страницы и оверлеи.</p>
    <nav class="dd-nav"><a href="dev-ux.html" class="is-on">UX</a><a href="dev-components.html">Компоненты</a><a href="dev-features.html">Фичи</a><a href="dev-model.html">Модель</a></nav>
    <div id="dd-body"></div>
  </div></main>
  <script src="../components/session.js"></script>
  <script src="../components/book-data.js"></script><script src="../components/author-data.js"></script>
  <script src="../components/publisher-data.js"></script><script src="../components/member-data.js"></script>
  <script src="../components/store.js"></script><script src="../components/sim.js"></script>
  <script src="../components/frame.js"></script><script src="../components/avatar-menu.js"></script>
  <script src="../components/notifications.js"></script><script src="../components/search.js"></script>
  <script src="../components/pulse.js"></script><script src="../components/debug.js"></script>
  <script src="../components/registration.js"></script><script src="../components/demo.js"></script>
  <script>
    function row(k,v,href){ return '<div class="dd-row"><span class="dd-k">'+(href?'<a href="'+href+'">'+k+'</a>':k)+'</span><span>'+v+'</span></div>'; }
    var TIER1=[['index.html','Мастер-фрейм: редирект по авторизации + сохранённой позиции'],['landing.html','Публичный Landing (Вербовка) — гость','landing.html'],['about.html','О проекте (community-first)','about.html'],['search.html','Результаты поиска (оверлей E → страница)','search.html'],['404.html','Ошибка'],['components.html','Хост общих компонентов','components.html']];
    var FRAMES=[['Library · library.html','Catalogue · Pantheon · Producers · Collection','library.html'],['Cabinet · cabinet.html','Poster(=Home,default) · Overview · Profile · Shelf · Excerpt · Correspondence','cabinet.html?tab=poster'],['Community · community.html','MemberBoard · Discussion · ReadingClub · Post · News · Pulse','community.html']];
    var CARDS=[['book.html','Book (+ Reader)','book.html?book=bion-learning'],['reader.html','Reader (Delve)','reader.html?book=bion-learning'],['author.html','Author','author.html?author=author-bion'],['publisher.html','Publisher','publisher.html?publisher=beta-alpha'],['member.html','Member','member.html?member=u2']];
    var OVERLAYS=[['A Login','реальный вход (debug-stub) против посеянных участников'],['B Registration','захват намерения → открывает Login (B-4)'],['C Notifications','производная, сгруппирована (O-10)'],['D Avatar menu','аккаунт + тема + размер'],['E Search panel','→ search.html'],['G Pulse','лента событий (= таб Pulse)'],['H Debug console','Users·Cohorts·Simulation·Data·Events·Adaptive'],['Toast / Demo','обратная связь · лёгкий тур (B-1)']];
    document.addEventListener('DOMContentLoaded',function(){ BA.frame.init({page:'dev-ux'});
      document.getElementById('dd-body').innerHTML =
        '<section class="dd-sec"><h2>Tier 1 — мастер-фрейм + 1-уровневые страницы</h2>'+TIER1.map(function(r){return row(r[0],r[1],r[2]);}).join('')+'</section>'+
        '<section class="dd-sec"><h2>Tier 2 — секция-фреймы (таб-бар) → Tier 3 табы</h2>'+FRAMES.map(function(r){return row(r[0],r[1],r[2]);}).join('')+'</section>'+
        '<section class="dd-sec"><h2>Entity-card страницы (1-уровневые, инжектятся в нижние)</h2>'+CARDS.map(function(r){return row(r[0],r[1],r[2]);}).join('')+'</section>'+
        '<section class="dd-sec"><h2>Оверлеи (не маршруты)</h2>'+OVERLAYS.map(function(r){return row(r[0],r[1]);}).join('')+'</section>';
    });
  </script>
</body>
</html>
