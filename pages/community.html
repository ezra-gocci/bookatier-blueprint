<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщество — β→α академия</title>
  <!-- ============================================================================
       community.html — 2nd-level SECTION FRAME (Tier 2): the Community.
       Feature areas: 12 (Members & Community) · 8 (Reactions & Discussion) ·
       10 (Reading Clubs) · 18 (Publishing/Post) · 19 (News) · 17 (Pulse).
       Spec refs: system-model §4.2/§4.8 (Community tabs MemberBoard · Discussion ·
       ReadingClub · Post · News · Pulse), §6.2; specs §1.9 (Reaction/Vote/Thread),
       §3.3 (weighted voting), §3.8 (Reviews Professional-only), §2 (events).
       All tabs consume BA.store (real, sim-populated). Reading is open; WRITE
       actions + the Post surface are session-gated (CON-01 / §3.5d). Tokens-only. -->
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/chrome.css">
  <link rel="stylesheet" href="../styles/book-card.css">
  <style>
    .sec-main { min-height: 100vh; }
    .sec-head { background: var(--ink); color: var(--paper); border-bottom: var(--hairline) solid var(--line); }
    .sec-head-inner { padding: var(--space-8, 32px) 0 var(--space-6, 24px); display: flex;
      align-items: flex-end; justify-content: space-between; gap: var(--space-5); flex-wrap: wrap; }
    .sec-eyebrow { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: color-mix(in srgb, var(--accent) 88%, var(--paper)); margin: 0 0 var(--space-1); }
    .sec-title { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; color: var(--paper); margin: 0; letter-spacing: -0.01em; }
    .sec-sub { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: color-mix(in srgb, var(--paper) 70%, transparent); margin: var(--space-2) 0 0; max-width: 56ch; }
    .sec-stats { display: flex; align-items: center; gap: var(--space-5, 20px); }
    .sec-stat { text-align: center; }
    .sec-stat-val { display: block; font-family: var(--font-serif); font-size: 1.5rem; font-weight: 600; color: var(--paper); }
    .sec-stat-lbl { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); text-transform: uppercase; letter-spacing: 0.04em; color: color-mix(in srgb, var(--paper) 60%, transparent); }
    .sec-tabs { position: sticky; top: var(--header-height, 64px); z-index: 80; background: color-mix(in srgb, var(--paper) 92%, transparent); backdrop-filter: blur(8px); border-bottom: var(--hairline) solid var(--line); }
    .sec-tabs-inner { display: flex; gap: var(--space-1, 4px); overflow-x: auto; }
    .sec-tab { font-family: var(--font-sans); font-size: var(--fs-body, 16px); font-weight: 500; color: var(--ink-soft); background: none; border: none; border-bottom: 2px solid transparent; padding: var(--space-4, 16px); cursor: pointer; white-space: nowrap; transition: color 140ms, border-color 140ms; }
    .sec-tab:hover { color: var(--ink); }
    .sec-tab.is-active { color: var(--accent); border-bottom-color: var(--accent); }
    .sec-tab-count { font-size: var(--fs-caption, 12px); color: var(--ink-faint); margin-left: 4px; }
    #sec-content { min-height: 50vh; padding-bottom: var(--space-12); }
    /* full login gate (same as cabinet) for the non-News tabs when signed out */
    .sec-gate { padding: var(--space-16, 64px) var(--space-4); text-align: center; max-width: 44ch; margin: 0 auto; }
    .sec-gate h2 { font-family: var(--font-serif); font-size: var(--fs-h2, 22px); color: var(--ink); margin: 0 0 var(--space-3); }
    .sec-gate p { font-family: var(--font-sans); font-size: var(--fs-body, 16px); color: var(--ink-soft); line-height: 1.6; margin: 0 0 var(--space-5); }
    /* write-gate notice */
    .gate-note { background: var(--surface-sunk); border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px);
      padding: var(--space-4, 16px); margin: var(--space-5, 20px) 0; font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-soft); display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); }
    .gate-note .btn { white-space: nowrap; }
    .empty { font-family: var(--font-sans); color: var(--ink-faint); font-style: italic; padding: var(--space-8) 0; text-align: center; }
    /* member grid */
    .mb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4, 16px); padding: var(--space-6) 0; }
    @media (max-width: 860px){ .mb-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px){ .mb-grid { grid-template-columns: 1fr; } }
    .mb-card { display: flex; gap: var(--space-4, 16px); padding: var(--space-4, 16px); align-items: flex-start;
      border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface); text-decoration: none; transition: border-color 140ms, box-shadow 140ms; }
    .mb-card:hover { border-color: var(--accent); box-shadow: var(--shadow-soft); }
    .mb-av { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid var(--line); background: var(--surface-sunk); flex-shrink: 0; }
    .mb-info { min-width: 0; flex: 1; }
    .mb-name { font-family: var(--font-serif); font-size: var(--fs-h3, 18px); font-weight: 600; color: var(--ink); margin: 0; line-height: 1.25; }
    .mb-spec { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); margin: 2px 0 0; }
    .mb-foot { display: flex; align-items: center; gap: var(--space-2); margin-top: var(--space-3, 12px); flex-wrap: wrap; }
    .rep-pill { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: 600;
      padding: 3px 9px; border-radius: var(--radius-pill, 999px); border: var(--hairline) solid var(--line); color: var(--amber); font-variant-numeric: tabular-nums; }
    .role-badge { display: inline-flex; align-items: center; font-family: var(--font-sans); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 2px 8px; border-radius: var(--radius-pill, 999px); border: var(--hairline) solid var(--line); color: var(--ink-soft); }
    .role-badge--pro { color: var(--sage); border-color: var(--sage); }
    .role-badge--mod { color: var(--slate); border-color: var(--slate); }
    .role-badge--adm { color: var(--accent); border-color: var(--accent); }
    /* discussion list */
    .disc-list { display: flex; flex-direction: column; gap: var(--space-4, 16px); padding: var(--space-5) 0; }
    .disc-item { border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface); padding: var(--space-4, 16px); }
    .disc-head { display: flex; align-items: center; gap: var(--space-3, 12px); margin-bottom: var(--space-2, 8px); }
    .disc-av { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: var(--hairline) solid var(--line); background: var(--surface-sunk); }
    .disc-who { font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: 600; color: var(--ink); }
    .disc-where { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); }
    .disc-where a { color: var(--accent); text-decoration: none; }
    .disc-when { margin-left: auto; font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); }
    .disc-text { font-family: var(--font-serif); font-size: var(--fs-body, 16px); line-height: 1.6; color: var(--ink); margin: 0 0 var(--space-3); }
    .disc-foot { display: flex; align-items: center; gap: var(--space-4, 16px); }
    .vote-ctl { display: inline-flex; align-items: center; gap: var(--space-2, 8px); }
    .vote-btn { background: var(--surface-sunk); border: var(--hairline) solid var(--line); color: var(--ink-soft); border-radius: var(--radius-pill, 999px);
      width: 30px; height: 30px; cursor: pointer; font-size: 15px; line-height: 1; transition: all 120ms; }
    .vote-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .vote-score { font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; min-width: 22px; text-align: center; }
    .disc-reply-btn { background: none; border: none; color: var(--ink-soft); font-family: var(--font-sans); font-size: var(--fs-small, 14px); cursor: pointer; }
    .disc-reply-btn:hover { color: var(--accent); }
    .badge-review { display: inline-flex; font-family: var(--font-sans); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--accent); border: var(--hairline) solid var(--accent); border-radius: var(--radius-pill, 999px); padding: 1px 7px; margin-left: var(--space-2); }
    .disc-replies { margin-top: var(--space-3); padding-left: var(--space-5, 20px); border-left: 2px solid var(--line); display: flex; flex-direction: column; gap: var(--space-2); }
    .disc-reply { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-soft); }
    .disc-reply b { color: var(--ink); font-weight: 600; }
    .compose { display: flex; gap: var(--space-2, 8px); margin-top: var(--space-3); }
    .compose textarea { flex: 1; resize: vertical; min-height: 38px; font-family: var(--font-sans); font-size: var(--fs-small, 14px);
      padding: 8px 12px; border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface-sunk); color: var(--ink); }
    .compose textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    /* clubs / news / post / pulse */
    .clab-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4, 16px); padding: var(--space-5) 0; }
    @media (max-width: 700px){ .clab-grid { grid-template-columns: 1fr; } }
    .clab-card { border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface); padding: var(--space-5, 20px); }
    .clab-name { font-family: var(--font-serif); font-size: var(--fs-h3, 18px); font-weight: 600; color: var(--ink); margin: 0 0 var(--space-2); }
    .clab-desc { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-soft); line-height: 1.5; margin: 0 0 var(--space-3); }
    .clab-meta { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); }
    .clab-owners { display: flex; gap: 4px; margin-top: var(--space-3); }
    .clab-owner-av { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--surface); margin-left: -8px; object-fit: cover; background: var(--surface-sunk); }
    .clab-owner-av:first-child { margin-left: 0; }
    .news-list { display: flex; flex-direction: column; gap: var(--space-4, 16px); padding: var(--space-5) 0; }
    .news-item { border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface); padding: var(--space-5, 20px); }
    .news-eyebrow { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin: 0 0 var(--space-1); display: flex; align-items: center; gap: var(--space-2); }
    .news-seal { width: 22px; height: 22px; border-radius: var(--radius-sm, 6px); background: var(--ink); color: var(--paper); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 11px; font-weight: 700; }
    .news-title { font-family: var(--font-serif); font-size: var(--fs-h3, 18px); font-weight: 600; color: var(--ink); margin: 0 0 var(--space-2); }
    .news-body { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-soft); line-height: 1.6; margin: 0; }
    .news-when { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); margin-top: var(--space-2); }
    /* --- Publisher-news (origin News page content) ------------------------ */
    .pn-wrap { padding: var(--space-6) 0 var(--space-12); }
    .pn-chip { display: inline-flex; align-items: center; font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: var(--fw-medium, 500); letter-spacing: var(--tracking-label, 0.02em); padding: 2px var(--space-2); border-radius: var(--radius-pill, 9999px); border: var(--hairline, 1px) solid currentColor; white-space: nowrap; flex-shrink: 0; }
    .pn-chip--publisher { color: var(--amber); }
    .pn-chip--community { color: var(--slate); }
    .pn-chip--platform  { color: var(--accent); }
    .pn-chip--culture   { color: var(--sage); }
    .pn-date { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); letter-spacing: var(--tracking-caption, 0.04em); color: var(--ink-soft); }
    /* Featured article */
    .pn-featured { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: var(--hairline, 1px) solid var(--line); border-radius: var(--radius-md, 10px); overflow: hidden; background: var(--surface); box-shadow: var(--shadow-soft); margin-bottom: var(--space-12); transition: box-shadow var(--dur-base, 200ms) var(--ease-out-quart, ease); }
    .pn-featured:hover { box-shadow: 0 8px 32px color-mix(in srgb, var(--ink) 12%, transparent); }
    .pn-featured-img-col { overflow: hidden; background: var(--surface-sunk); }
    .pn-featured-img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 280px; transition: transform 500ms var(--ease-out-quart, ease); }
    .pn-featured:hover .pn-featured-img { transform: scale(1.02); }
    .pn-featured-content { padding: var(--space-12); display: flex; flex-direction: column; gap: var(--space-4); justify-content: center; }
    .pn-meta { display: flex; align-items: center; gap: var(--space-3); }
    .pn-featured-title { font-family: var(--font-serif); font-size: clamp(1.25rem, 2vw, 1.625rem); font-weight: var(--fw-semibold, 600); color: var(--ink); margin: 0; line-height: 1.35; }
    .pn-featured-excerpt { font-family: var(--font-serif); font-size: var(--fs-body, 16px); color: var(--ink-soft); line-height: var(--lh-body, 1.5); margin: 0; }
    .pn-more { font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: var(--fw-medium, 500); letter-spacing: var(--tracking-label, 0.02em); color: var(--accent); text-decoration: none; align-self: flex-start; transition: color var(--dur-fast, 120ms); }
    .pn-more:hover { color: var(--accent-hover); text-decoration: underline; }
    /* News grid + cards */
    .pn-label { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: var(--fw-medium, 500); letter-spacing: var(--tracking-caption, 0.04em); text-transform: uppercase; color: var(--ink-soft); padding-bottom: var(--space-4); border-bottom: var(--hairline, 1px) solid var(--line); margin: var(--space-16) 0 var(--space-6); }
    .pn-label:first-of-type { margin-top: 0; }
    .pn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-6); }
    .pn-card { background: var(--surface); border: var(--hairline, 1px) solid var(--line); border-radius: var(--radius-md, 10px); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-soft); transition: transform var(--dur-base, 200ms) var(--ease-out-quart, ease), box-shadow var(--dur-base, 200ms) var(--ease-out-quart, ease), border-color var(--dur-base, 200ms) var(--ease-out-quart, ease); }
    .pn-card:hover { transform: translateY(-3px); box-shadow: 0 6px 22px color-mix(in srgb, var(--ink) 10%, transparent); border-color: color-mix(in srgb, var(--ink) 14%, transparent); }
    .pn-card-img-wrap { aspect-ratio: 16 / 9; overflow: hidden; background: var(--surface-sunk); flex-shrink: 0; }
    .pn-card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 500ms var(--ease-out-quart, ease); }
    .pn-card:hover .pn-card-img { transform: scale(1.04); }
    .pn-card-body { padding: var(--space-6); display: flex; flex-direction: column; gap: var(--space-3); flex: 1; }
    .pn-card-title { font-family: var(--font-serif); font-size: var(--fs-body, 16px); font-weight: var(--fw-semibold, 600); color: var(--ink); margin: 0; line-height: var(--lh-body, 1.5); }
    .pn-card-excerpt { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink-soft); line-height: var(--lh-small, 1.45); margin: 0; }
    .pn-card-link { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); font-weight: var(--fw-medium, 500); letter-spacing: var(--tracking-label, 0.02em); color: var(--accent); text-decoration: none; align-self: flex-start; margin-top: auto; }
    .pn-card:hover .pn-card-link { text-decoration: underline; }
    /* Featured nav (prev / next) */
    .pn-featured-nav { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-5); }
    .pn-nav-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: transparent; border: var(--hairline, 1px) solid var(--line); border-radius: var(--radius-pill, 9999px); color: var(--ink-soft); font-size: 0.85rem; cursor: pointer; flex-shrink: 0; padding: 0; transition: color var(--dur-fast, 120ms) var(--ease-out-quart, ease), border-color var(--dur-fast, 120ms) var(--ease-out-quart, ease); }
    .pn-nav-btn:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-faint); }
    .pn-nav-btn:disabled { opacity: 0.35; cursor: default; }
    .pn-nav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .pn-nav-label { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); white-space: nowrap; }
    /* Cards are clickable to promote */
    .pn-grid .pn-card { cursor: pointer; }
    .pn-grid .pn-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    /* Expand / collapse buttons inside featured */
    .pn-expand-btn, .pn-collapse-btn { display: inline-flex; align-items: center; font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: var(--fw-medium, 500); letter-spacing: var(--tracking-label, 0.02em); color: var(--accent); background: transparent; border: none; padding: 0; cursor: pointer; align-self: flex-start; margin-top: var(--space-2); transition: color var(--dur-fast, 120ms); }
    .pn-expand-btn:hover, .pn-collapse-btn:hover { color: var(--accent-hover); text-decoration: underline; }
    .pn-expand-btn:focus-visible, .pn-collapse-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    /* Expanded featured — single column, top-aligned, full body */
    .pn-featured--expanded { grid-template-columns: 1fr !important; }
    .pn-featured--expanded:hover { box-shadow: var(--shadow-soft) !important; }
    .pn-featured--expanded:hover .pn-featured-img { transform: none !important; }
    .pn-featured--expanded .pn-featured-img-col { max-height: 360px; }
    .pn-featured--expanded .pn-featured-img { min-height: 200px; max-height: 360px; }
    .pn-featured--expanded .pn-featured-content { padding: var(--space-8) var(--space-12); justify-content: flex-start; }
    .pn-featured-full-text { font-family: var(--font-serif); font-size: var(--fs-body, 16px); color: var(--ink-soft); line-height: var(--lh-body, 1.5); }
    .pn-featured-full-text p { margin: 0 0 var(--space-4); }
    .pn-featured-full-text p:last-child { margin-bottom: 0; }
    @media (max-width: 900px) {
      .pn-featured { grid-template-columns: 1fr; }
      .pn-featured-img { min-height: 220px; }
      .pn-featured-content { padding: var(--space-8); }
      .pn-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .pn-grid { grid-template-columns: 1fr; }
      .pn-featured-content { padding: var(--space-6); }
      .pn-featured--expanded .pn-featured-content { padding: var(--space-6); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pn-card, .pn-featured, .pn-card-img, .pn-featured-img, .pn-nav-btn { transition: none; }
    }
    .post-form { max-width: 600px; padding: var(--space-6) 0; }
    .post-form label { display: block; font-family: var(--font-sans); font-size: var(--fs-small, 14px); font-weight: 600; color: var(--ink); margin: var(--space-4) 0 var(--space-2); }
    .post-form textarea, .post-form select, .post-form input { width: 100%; box-sizing: border-box; font-family: var(--font-sans); font-size: var(--fs-small, 14px);
      padding: 9px 13px; border: var(--hairline) solid var(--line); border-radius: var(--radius-md, 10px); background: var(--surface-sunk); color: var(--ink); }
    .post-form textarea { min-height: 110px; resize: vertical; }
    .post-row { display: flex; gap: var(--space-4); flex-wrap: wrap; }
    .post-row > div { flex: 1; min-width: 180px; }
    .pulse-feed { display: flex; flex-direction: column; gap: 2px; padding: var(--space-5) 0; }
    .pulse-row { display: flex; align-items: baseline; gap: var(--space-3, 12px); padding: var(--space-3, 12px) 0; border-bottom: var(--hairline) solid var(--line); }
    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; align-self: center; }
    .pulse-dot--resource { background: var(--slate); }
    .pulse-dot--personal { background: var(--sage); }
    .pulse-text { font-family: var(--font-sans); font-size: var(--fs-small, 14px); color: var(--ink); flex: 1; }
    .pulse-text b { font-weight: 600; }
    .pulse-when { font-family: var(--font-sans); font-size: var(--fs-caption, 12px); color: var(--ink-faint); white-space: nowrap; }
    .pulse-dom { font-family: var(--font-sans); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); border: var(--hairline) solid var(--line); border-radius: var(--radius-pill, 999px); padding: 1px 6px; }
  </style>
</head>
<body>
  <main id="main-content" data-page-body class="sec-main">
    <section class="sec-head">
      <div class="container sec-head-inner">
        <div>
          <p class="sec-eyebrow">Сообщество</p>
          <h1 class="sec-title">Сообщество</h1>
          <p class="sec-sub">Профессиональная среда: участники, обсуждения, читательские клубы, публикации и пульс платформы.</p>
        </div>
        <div class="sec-stats" id="sec-stats"></div>
      </div>
    </section>
    <nav class="sec-tabs" aria-label="Разделы сообщества">
      <div class="container sec-tabs-inner" id="sec-tabs"></div>
    </nav>
    <div class="container" id="sec-content"></div>
  </main>

  <script src="../components/session.js"></script>
  <!-- data + engine (load order: data → member-data → store → sim) -->
  <script src="../components/book-data.js"></script>
  <script src="../components/author-data.js"></script>
  <script src="../components/publisher-data.js"></script>
  <script src="../components/member-data.js"></script>
  <script src="../components/store.js"></script>
  <script src="../components/sim.js"></script>
  <script src="../components/frame.js?v=4"></script>
  <script src="../components/avatar-menu.js"></script>
  <script src="../components/notifications.js"></script>
  <script src="../components/search.js"></script>
  <script src="../components/pulse.js"></script>
  <script src="../components/debug.js"></script>
  <script src="../components/registration.js"></script>
  <script src="../components/demo.js"></script>
  <script src="../components/reader-engine.js"></script>
  <script src="../components/book-card.js"></script>
  <script src="../components/member-card.js"></script>
  <script src="../components/remark-card.js"></script>
  <script src="../components/author-card.js"></script>

  <script>
    /* ── Community section frame — every tab consumes BA.store (sim-populated). ── */
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    var TABS = [
      { key:'news', label:'Новости' },
      { key:'member-board', label:'Участники' }, { key:'discussion', label:'Обсуждения' },
      { key:'reading-club', label:'Клубы' }, { key:'post', label:'Публикация' },
      { key:'pulse', label:'Пульс' }
    ];
    var SAVED_KEY = 'com-tab';
    var ST = function(){ return window.BA.store; };

    /* ── shared helpers ── */
    function memberName(id){ var m = ST().memberRecord(id); return m ? m.displayName : id; }
    function bookTitle(slug){ var b = BA.bookData.get(slug); return b ? b.title : slug; }
    function timeAgo(iso){
      if (!iso) return '';
      var s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
      if (s < 60) return 'только что';
      var m = Math.floor(s/60); if (m < 60) return m+' мин. назад';
      var h = Math.floor(m/60); if (h < 24) return h+' ч. назад';
      var d = Math.floor(h/24); if (d < 30) return d+' дн. назад';
      return new Date(iso).toLocaleDateString('ru-RU');
    }
    function roleBadge(pp){
      if (pp.role==='Admin') return '<span class="role-badge role-badge--adm">Админ</span>';
      if (pp.role==='Moderator') return '<span class="role-badge role-badge--mod">Модератор</span>';
      if (pp.role==='Professional') return '<span class="role-badge role-badge--pro">Профессионал</span>';
      return '';
    }
    function repPill(pp){ return '<span class="rep-pill">★ '+pp.reputationScore+' · '+esc(pp.rank)+'</span>'; }
    function gateNote(msg){
      return '<div class="gate-note"><span>'+esc(msg)+'</span><button class="btn btn-primary" type="button" onclick="BA.frame.openLogin()">Войти</button></div>';
    }

    /* ── MemberBoard (area 12) ── */
    function renderMemberBoard(host){
      var people = BA.memberData.people(); // humans incl. mock; excludes bot/system
      var cards = people.map(function(m){
        var pp = ST().publicProfileOf(m.id);
        return '<a class="mb-card" href="member.html?member='+esc(m.id)+'">' +
          '<img class="mb-av" src="'+esc(BA.memberData.avatar(m))+'" alt="" loading="lazy">' +
          '<span class="mb-info"><p class="mb-name">'+esc(pp.displayName)+'</p>' +
          '<p class="mb-spec">'+esc(m.specialisation||'')+'</p>' +
          '<span class="mb-foot">'+roleBadge(pp)+repPill(pp)+'</span></span>' +
        '</a>';
      }).join('');
      host.innerHTML = (BA.session.isPrivate()? '' : gateNote('Войдите, чтобы подписываться на коллег и писать сообщения.')) +
        '<div class="mb-grid">'+cards+'</div>';
    }

    /* ── Discussion (area 8) — recent comments + reviews with weighted votes ── */
    function discItem(r){
      var pp = ST().publicProfileOf(r.authorId) || { displayName: r.authorId, reputationScore:0, rank:'' };
      var tally = ST().weightedTally('reaction', r.id);
      var canVote = ST().can('vote');
      var replies = ST().repliesOf(r.id);
      var isReview = r.form==='review';
      var text = r.piece ? r.piece.text : '';
      var repliesHTML = replies.slice(0,3).map(function(rp){
        return '<div class="disc-reply"><b>'+esc(memberName(rp.authorId))+'</b>: '+esc(rp.piece?rp.piece.text:'')+'</div>';
      }).join('');
      return '<div class="disc-item" data-rid="'+esc(r.id)+'">' +
        '<div class="disc-head">' +
          '<img class="disc-av" src="'+esc(BA.memberData.avatar(ST().memberRecord(r.authorId)||{id:r.authorId}))+'" alt="">' +
          '<span><span class="disc-who">'+esc(pp.displayName)+'</span>'+(isReview?'<span class="badge-review">Рецензия'+(r.rating?' ★'+r.rating:'')+'</span>':'')+
          '<br><span class="disc-where">о книге «<a href="book.html?book='+esc(r.targetId)+'">'+esc(bookTitle(r.targetId))+'</a>»</span></span>' +
          '<span class="disc-when">'+esc(timeAgo(r.createdAt))+'</span>' +
        '</div>' +
        '<p class="disc-text">'+esc(text)+'</p>' +
        '<div class="disc-foot">' +
          '<span class="vote-ctl"><button class="vote-btn" data-vote="up" '+(canVote?'':'disabled')+' title="За" aria-label="Голос за">▲</button>' +
          '<span class="vote-score">'+(tally.score||0)+'</span>' +
          '<button class="vote-btn" data-vote="down" '+(canVote?'':'disabled')+' title="Против" aria-label="Голос против">▼</button></span>' +
          '<button class="disc-reply-btn" data-reply '+(ST().can('reply')?'':'disabled style="opacity:.5"')+'>Ответить'+(replies.length?' · '+replies.length:'')+'</button>' +
        '</div>' +
        (repliesHTML?'<div class="disc-replies">'+repliesHTML+'</div>':'') +
      '</div>';
    }
    function renderDiscussion(host){
      var rx = ST().find('reactions', function(r){ return (r.form==='comment'||r.form==='review') && r.targetType==='publication' && !r.deleted; })
        .sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); }).slice(0,24);
      host.innerHTML = (BA.session.isPrivate()? '' : gateNote('Войдите, чтобы голосовать и отвечать. Рецензии доступны профессионалам.')) +
        (rx.length? '<div class="disc-list">'+rx.map(discItem).join('')+'</div>' : '<p class="empty">Обсуждений пока нет.</p>');
      if (host._discWired) return;
      host._discWired = true;
      host.addEventListener('click', function(e){
        if (!document.querySelector('.disc-list')) return;       // only act while Discussion is shown
        var item = e.target.closest('.disc-item'); if (!item) return;
        var rid = item.getAttribute('data-rid');
        var rec = ST().first('reactions', function(r){ return r.id===rid; });
        var vb = e.target.closest('.vote-btn');
        if (vb && rec){ if(!ST().can('vote')){ BA.frame.openLogin(); return; }
          ST().castVote({ target:{type:'reaction', id:rid}, direction: vb.getAttribute('data-vote'), recipientId: rec.authorId });
          renderDiscussion(host); return; }
        if (e.target.closest('[data-reply]') && rec){ if(!ST().can('reply')){ BA.frame.openLogin(); return; }
          toggleReply(item, rid); }
      });
    }
    function toggleReply(item, rid){
      if (item.querySelector('.compose')) return;
      var box = document.createElement('div'); box.className='compose';
      box.innerHTML = '<textarea placeholder="Ваш ответ…"></textarea><button class="btn btn-primary" type="button">Отправить</button>';
      item.appendChild(box);
      box.querySelector('button').addEventListener('click', function(){
        var t = box.querySelector('textarea').value.trim(); if(!t) return;
        ST().addReply({ parentReactionId: rid, text: t });
        BA.frame.showToast('Ответ опубликован');
        renderDiscussion(document.getElementById('sec-content'));
      });
    }

    /* ── Reading Clubs (area 10) ── */
    var CLUBS = [
      { id:'bion-field', name:'Бионианское поле', desc:'Совместное чтение Биона и постбионианцев: внимание, контейнирование, теория мышления.', owners:['u3','u6'], members:14 },
      { id:'italian', name:'Итальянская школа', desc:'Ферро, Николи и аналитическое поле — обсуждаем перевод и клинику.', owners:['u2','u7'], members:11 },
      { id:'clinic', name:'Клинический семинар', desc:'Разбор виньеток, техника интерпретации, перенос и контрперенос.', owners:['u5'], members:9 }
    ];
    function renderClubs(host){
      var canCreate = ST().can('create_club');
      var cards = CLUBS.map(function(c){
        var owners = c.owners.map(function(id){ return '<img class="clab-owner-av" src="'+esc(BA.memberData.avatar(ST().memberRecord(id)||{id:id}))+'" alt="'+esc(memberName(id))+'" title="'+esc(memberName(id))+'">'; }).join('');
        return '<div class="clab-card"><p class="clab-name">'+esc(c.name)+'</p>' +
          '<p class="clab-desc">'+esc(c.desc)+'</p>' +
          '<p class="clab-meta">'+c.members+' участников · ведут: '+c.owners.map(memberName).map(esc).join(', ')+'</p>' +
          '<div class="clab-owners">'+owners+'</div></div>';
      }).join('');
      host.innerHTML = '<div class="gate-note"><span>Читательский клуб — именованное подмножество участников с собственными обсуждениями. Создавать клубы могут профессионалы (Verified).</span>' +
        (canCreate? '<button class="btn btn-primary" type="button" onclick="BA.frame.showToast(\'Создание клуба — заглушка Primer\')">Создать клуб</button>' : '<button class="btn btn-ghost" type="button" disabled title="Только для профессионалов">Создать клуб</button>') +
        '</div><div class="clab-grid">'+cards+'</div>';
    }

    /* ── Post (area 18) — publish surface ── */
    function renderPost(host){
      if (!BA.session.isPrivate()){ host.innerHTML = gateNote('Войдите, чтобы опубликовать заметку или подборку.'); return; }
      host.innerHTML = '<form class="post-form" id="post-form">' +
        '<label for="pf-title">Заголовок</label><input id="pf-title" type="text" placeholder="Краткий заголовок">' +
        '<label for="pf-text">Текст (частная заметка → публичная)</label><textarea id="pf-text" placeholder="Поделитесь мыслью с сообществом…"></textarea>' +
        '<div class="post-row"><div><label for="pf-dest">Куда</label><select id="pf-dest">' +
          '<option value="discussions">В обсуждения</option><option value="club">В клуб</option></select></div>' +
        '<div><label for="pf-vis">Кому</label><select id="pf-vis"><option value="public">Всем</option><option value="member-only">Только участникам</option></select></div></div>' +
        '<div style="margin-top:var(--space-5)"><button class="btn btn-primary" type="submit">Опубликовать</button></div>' +
        '<p class="clab-meta" style="margin-top:var(--space-3)">Публикация делает частный материал публичным (Post — действие, не сущность; принцип §1.12). Новости (β→α) публикует Ресурс.</p>' +
      '</form>';
      document.getElementById('post-form').addEventListener('submit', function(e){
        e.preventDefault();
        var title = document.getElementById('pf-title').value.trim();
        var text = document.getElementById('pf-text').value.trim();
        if (!text){ return; }
        ST().publishPost({ itemKind:'piece', title:title, text:text, destination:document.getElementById('pf-dest').value, visibility:document.getElementById('pf-vis').value });
        BA.frame.showToast('Опубликовано в сообществе');
        e.target.reset();
      });
    }

    /* ── News (area 19) — Resource posts via Bot ── */
    // Public News content (carried from the origin site's News page; shown to guests and members alike).
    // Full article bodies (origin FULL_TEXTS), keyed by title — shown when a card is promoted/expanded.
    var NEWS_FULL_TEXTS = {
      'Книги β→α появились в «Подписных изданиях»':
        '<p>Специальный стенд с нашими изданиями открыт в петербургском «Подписных изданиях» — одном из лучших книжных магазинов страны. Для тех, кто хочет подержать книгу в руках прежде чем открыть читалку.</p>' +
        '<p>«Подписные издания» — магазин с особой культурой: здесь не продают случайные книги, здесь отбирают. Появление наших изданий в этом пространстве — не просто коммерческая история. Это признание того, что психоаналитическая литература заслуживает места рядом с Платоновым, Цветаевой и Кьеркегором на полках, к которым тянутся читающие люди.</p>' +
        '<p>На стенде три книги: «Научение на опыте» Биона в обновлённом переводе, «Гореть вместе» под редакцией Николи и «Избегание эмоций, проживание эмоций» Антонино Ферро. Все три — в мягкой обложке, с аннотацией, которую мы писали долго и трудно, стараясь не скатиться ни в академическую сухость, ни в завлекательную размытость.</p>' +
        '<p>За первую неделю стенд посетили несколько сотен человек. Продажи скромные — как и у любой профессиональной литературы. Но обратная связь иная: люди берут книгу в руки, читают несколько страниц прямо у полки, иногда фотографируют. Один читатель написал нам, что стоял с «Гореть вместе» тридцать минут, опоздал на встречу и не жалеет.</p>' +
        '<p>Если вы в Петербурге — загляните. Стенд в основном зале, у стены напротив кассы. Если вы не в Петербурге — всё то же самое уже доступно в цифровом виде на платформе, с закладками, заметками и академической цитатой для любой страницы.</p>',
      'Психоанализ в третьем тайме':
        '<p>Подписчики β→α читают везде. Стадион «Лужники», матч ЦСКА — и три книги из нашего каталога на трибунах. Это не постановка. Счёт 1:1, перерыв, Бион.</p>' +
        '<p>Нам прислали фотографию. Трибуна «В», сектор двадцать что-то, три ряда подряд. Один болельщик — молодой, в шарфе цветов ЦСКА — держит «Научение на опыте». Рядом девушка, она не смотрит на поле, она в книге. Третий, постарше, стоит с телефоном и, судя по всему, ищет цитату в читалке.</p>' +
        '<p>Мы не знаем, как это произошло. Может быть, они знакомы — коллеги, терапевты, студенты одной программы. Может быть, совпадение. Может быть, что-то происходит с психоаналитической литературой — она выходит из кабинетов и супервизорских комнат и начинает жить в обычном мире.</p>' +
        '<p>Это нас радует. Мы делаем издательство не для того, чтобы книги стояли на полке в кожаном переплёте и ждали торжественного момента. Мы делаем его для того, чтобы профессионал мог читать Биона в метро, в очереди, на трибуне стадиона — и это было бы нормально, привычно, почти бытово.</p>' +
        '<p>Счёт закончился 2:1. ЦСКА проиграл. Но один из читателей написал нам потом, что это был хороший вечер.</p>',
      'Биономерная модель на скорости 300 км/ч':
        '<p>Что, если аналитическая работа — это гонка, где каждый поворот требует полного присутствия? Виньетка без слов — только изображение и пауза.</p>' +
        '<p>Книга лежит на руле. Страница с диаграммой L-связей Биона — тот самый рисунок, который он рисовал на лекциях в Лос-Анджелесе. Машина похожа на тренировочную, бокс, тишина.</p>' +
        '<p>Мы получили это изображение от одного из наших подписчиков. Он — инженер по безопасности в автоспорте, параллельно проходит аналитическую подготовку. «Я читаю Биона между заездами», — написал он. — «Там, кстати, то же самое: ты должен присутствовать целиком, но не зажиматься. Отпустить контроль, чтобы контроль работал.»</p>' +
        '<p>Мы думаем об этом часто. Психоаналитическая теория описывает состояния внимания, которые применимы далеко за пределами клиники. Ревери как способ обработки опыта — это не только про кушетку. Это про любую практику, где требуется одновременно присутствовать и не цепляться.</p>' +
        '<p>Диаграмма Биона на руле гоночного автомобиля — может быть, лучшее из объяснений, которые мы видели.</p>',
      'Нужно больше Несси: идеальная компания для летнего чтения':
        '<p>Читать Ферро у лесного озера — уже само по себе сюрреализм. Но иногда природа идёт навстречу и присылает подходящего собеседника.</p>' +
        '<p>Фотография пришла в конце мая. Девушка сидит на берегу, в руках — «Избегание эмоций, проживание эмоций», страница примерно в середине книги — там, где Ферро пишет о трансформации бета-элементов. На заднем плане туман над озером, и в тумане — что-то длинное, тёмное и явно не бревно.</p>' +
        '<p>Мы сначала решили, что это монтаж. Потом посмотрели внимательнее. Потом написали подписчице. «Нет, это настоящее», — ответила она. — «Я была в Шотландии, у Лох-Несса. И да, я читала Ферро. Это совпало.»</p>' +
        '<p>Есть что-то правильное в том, чтобы читать книгу о встрече с непознаваемым рядом с существом, которое человечество не может ни подтвердить, ни опровергнуть уже восемьдесят лет. «Несси как "О"-объект» — это написал кто-то в комментариях к фотографии в нашем чате, не мы.</p>' +
        '<p>Лето — хорошее время для Ферро. И для озёр, в которых живёт то, чему у нас пока нет названия.</p>',
      'β→α выпускает третье издание книги Биона':
        '<p>«Научение на опыте» в переработанном переводе: уточнённая терминология, сверенный с оригиналом текст, новая расстановка приоритетов в ключевых понятиях.</p>' +
        '<p>Третье издание — не косметическая правка. Мы вернулись к тексту принципиально, с новым переводчиком в команде и с фокусом на проблему, которая мучила нас с первого издания: Бион пишет так, что его можно понять только если уже понимаешь. Терминология самоотсылочна, примеры предполагают клинический опыт, логика скачет.</p>' +
        '<p>Первые два издания мы следовали за оригиналом максимально буквально. В третьем мы позволили себе — осторожно, с комментариями — расставить акценты. Там, где Бион использует неологизм, мы сохраняем его, но добавляем сноску с родственными понятиями. Там, где структура предложения в английском опирается на интонацию живой речи — а «Итальянские семинары» именно такие, стенограммы лекций — мы переводим смысл, а не синтаксис.</p>' +
        '<p>Новое издание выйдет в цифровом виде на платформе первым. Читатели, у которых уже есть подписка, получат доступ к новой версии автоматически — в читалке будет видно: «версия 3.0 — обновлённый перевод 2026».</p>' +
        '<p>Если вы читали предыдущие версии — попробуйте открыть главу о контейнере и содержимом. Там больше всего изменений, и они, как нам кажется, того стоили.</p>',
      'Обсуждение: аффективная регуляция в клиническом контексте':
        '<p>Дискуссия, которая началась в комментариях к Ферро и переросла в тред на 40 участников. Сохранили — он длинный и очень хороший.</p>' +
        '<p>Началось с одного комментария к шестой главе «Избегания эмоций»: кто-то написал, что не понимает, чем ферровское «трансформирование» отличается от классического контейнирования по Биону — или это одно и то же, только другими словами? Обычно такие вопросы получают три ответа и затихают. Этот получил сорок. За три дня.</p>' +
        '<p>Участники — клиницисты, теоретики, несколько студентов аналитических программ — разобрали понятие послойно. К концу треда выяснилось: терминология действительно размыта в самом оригинале, и это, возможно, намеренно. Практический вопрос («что я делаю с аффектом пациента прямо сейчас») и теоретический («какова структура этого процесса») — не одно и то же, и смешение их в одной дискуссии даёт интересный результат.</p>' +
        '<p>Мы сохранили тред в разделе «Дискуссии». Он доступен всем подписчикам, читается в хронологическом порядке или по ветке.</p>' +
        '<p>Если вы ещё не читали «Избегание эмоций» — это неплохое введение в книгу: посмотреть, о чём спорят те, кто уже прочитал, и решить, хочется ли вам в это погрузиться.</p>',
      'Открыт читальный зал: первые 50 участников получили доступ':
        '<p>Первая волна приглашений отправлена. Мы выбрали специалистов, которые давно работают с психоаналитической литературой и готовы оставлять развёрнутые отзывы.</p>' +
        '<p>Критерии отбора были простыми и конкретными: практикующий специалист, опыт работы с профессиональной литературой не меньше пяти лет, готовность написать хотя бы один развёрнутый отзыв в первый месяц. Никаких формальных должностей, никакой аффилиации.</p>' +
        '<p>Из примерно 200 кандидатов — 50 участников. Половина из Москвы и Петербурга, половина из других городов и двух зарубежных стран. Средний опыт в профессии — одиннадцать лет. Восемь человек сами занимаются переводами психоаналитических текстов.</p>' +
        '<p>Первые отзывы начали поступать уже через несколько часов после открытия доступа. Большинство — об интерфейсе читалки. Это хорошо: значит, люди читают, а не просто смотрят. Несколько человек написали подробно о переводе Биона — мы передали комментарии переводчику.</p>' +
        '<p>Следующая волна приглашений — через месяц. Если вы хотите попасть в список — оставьте заявку через кнопку «Присоединиться». Мы читаем все.</p>',
      '«Пространство сновидения» Томаса Огдена: перевод завершён':
        '<p>Работа над переводом одной из ключевых книг Огдена завершена. Профессиональная редактура займёт ещё шесть недель — после чего книга выйдет на платформе.</p>' +
        '<p>«Пространство сновидения» — одна из самых трудных книг для перевода в нашем каталоге. Огден пишет теоретически плотно, но при этом не сухо: у него есть ритм, есть образы, есть места, где теория переходит в нечто похожее на поэзию. Перевести это — значит не просто найти терминологические эквиваленты, но сохранить тональность.</p>' +
        '<p>Переводчик — Мария Ш., которая работала с нами на «Гореть вместе». Она потратила на книгу восемь месяцев. «Я читала её трижды, прежде чем начала переводить», — написала она. — «И ещё раз — когда закончила. Каждый раз это другая книга.»</p>' +
        '<p>В редактуре участвуют два клинициста с теоретической подготовкой — они проверяют не только перевод терминов, но и то, насколько текст остаётся клинически узнаваемым. Это важно для Огдена: его теория выросла из практики, и это должно быть слышно.</p>' +
        '<p>Релиз запланирован на август. Подписчики платформы получат доступ первыми — за две недели до бумажного тиража.</p>',
      'Антонино Ферро: о переводе психоаналитических понятий на русский':
        '<p>«Ревери» нельзя перевести буквально — но и транслитерацией оставлять нельзя. Разговор с переводчиком «Избегания эмоций» о том, что значит понять текст через живой опыт.</p>' +
        '<p>— Вы перевели слово «reverie» как «мечтание». Почему не «ревери», как принято в некоторых других переводах?<br>— Потому что «ревери» звучит как технический термин, а у Ферро это живое состояние. Он пишет о том, что аналитик делает не умом — он мечтает вместе с пациентом. «Мечтание» сохраняет это. Да, оно немного детское слово. Но в этом есть точность.</p>' +
        '<p>— Какое слово было самым сложным?<br>— «Waking dream thought». Это у Ферро отдельное понятие, почти эквивалент сновидческого мышления в бодрствовании. Я перевела как «мышление-грёза» — неологизм, но, кажется, он работает. Читатели не спотыкаются.</p>' +
        '<p>— Вы работали с итальянским оригиналом?<br>— Мы работали с авторизованным английским переводом. Итальянский я учила специально для этого проекта, чтобы иметь возможность сверяться. В двух местах английская версия отходит от оригинала достаточно сильно, чтобы это имело значение для смысла. В этих местах мы ориентировались на итальянский.</p>' +
        '<p>— Что посоветуете читателю, который только открывает Ферро?<br>— Читать медленно. Не торопиться понять каждое предложение. Ферро не объясняет — он показывает. Понимание приходит после, иногда сильно после.</p>',
      'Читалка β→α: обновление 1.2 — закладки, заметки, прогресс':
        '<p>В веб-ридере теперь: личные заметки на полях, закладки, отображение прогресса и точная академическая цитата для любой страницы с указанием версии.</p>' +

        '<p>Прогресс отображается в нижней строке: сколько страниц прочитано, сколько осталось, средняя скорость чтения за последние сессии. Это не давление — это ориентир. Многие читатели просили такую опцию, особенно те, кто читает плотные теоретические тексты.</p>' +

    // Public News page (origin pub-news.html) — featured slot with prev/next + expand, grid promotes to featured.
    function renderNews(host){
      var arts = NEWS_ARTICLES;
      // Persist selection on the host so the wired-once listener and every re-render share one state.
      var state = host._newsState || (host._newsState = { idx: 0, expanded: false });

      function chip(a){ return '<span class="pn-chip pn-chip--'+esc(a.cat)+'">'+esc(a.catLabel)+'</span>'; }
      function meta(a){ return '<div class="pn-meta">'+chip(a)+'<time class="pn-date" datetime="'+esc(a.dt)+'">'+esc(a.date)+'</time></div>'; }

      function navBar(){
        return '<div class="pn-featured-nav">' +
          '<button class="pn-nav-btn" data-nav="prev" type="button" aria-label="Предыдущая статья"'+(state.idx<=0?' disabled':'')+'>←</button>' +
          '<span class="pn-nav-label">'+(state.idx+1)+' / '+arts.length+'</span>' +
          '<button class="pn-nav-btn" data-nav="next" type="button" aria-label="Следующая статья"'+(state.idx>=arts.length-1?' disabled':'')+'>→</button>' +
        '</div>';
      }

      function featuredHtml(){
        var a = arts[state.idx];
        var cls = 'pn-featured ' + (state.expanded ? 'pn-featured--expanded' : 'pn-featured--collapsed');
        var body = state.expanded
          ? '<div class="pn-featured-full-text">'+(NEWS_FULL_TEXTS[a.title]||('<p>'+esc(a.excerpt)+'</p>'))+'</div>' +
            '<button class="pn-collapse-btn" data-act="collapse" type="button">↑ Свернуть</button>'
          : '<p class="pn-featured-excerpt">'+esc(a.excerpt)+'</p>' +
            '<button class="pn-expand-btn" data-act="expand" type="button">Читать статью →</button>';
        var content = '<div class="pn-featured-content"'+(a.hasImg?'':' style="max-width:640px"')+'>'+
          meta(a) +
          '<h2 class="pn-featured-title">'+esc(a.title)+'</h2>' +
          body +
        '</div>';
        var imgCol = a.hasImg
          ? '<div class="pn-featured-img-col"><img class="pn-featured-img" src="'+esc(a.img)+'" alt="'+esc(a.alt)+'"></div>'
          : '';
        return '<article class="'+cls+'" data-featured aria-label="Статья: '+esc(a.title)+'">'+imgCol+content+'</article>';
      }

      function illustratedCard(a, i){
        return '<article class="pn-card" data-idx="'+i+'" role="button" tabindex="0">' +
          '<div class="pn-card-img-wrap"><img class="pn-card-img" src="'+esc(a.img)+'" alt="'+esc(a.alt)+'" loading="lazy"></div>' +
          '<div class="pn-card-body">'+meta(a) +
            '<h3 class="pn-card-title">'+esc(a.title)+'</h3>' +
            '<p class="pn-card-excerpt">'+esc(a.excerpt)+'</p>' +
            '<span class="pn-card-link">Читать →</span>' +
          '</div></article>';
      }
      function textCard(a, i){
        return '<article class="pn-card pn-card--text" data-idx="'+i+'" role="button" tabindex="0">' +
          '<div class="pn-card-body">'+meta(a) +
            '<h3 class="pn-card-title">'+esc(a.title)+'</h3>' +
            '<p class="pn-card-excerpt">'+esc(a.excerpt)+'</p>' +
            '<span class="pn-card-link">Читать →</span>' +
          '</div></article>';
      }

      function gridHtml(){
        var illustrated = '', textual = '';
        arts.forEach(function(a, i){
          if (a.hasImg) illustrated += illustratedCard(a, i);
          else textual += textCard(a, i);
        });
        return '<p class="pn-label">Книги в неожиданных местах</p>' +
          '<div class="pn-grid">'+illustrated+'</div>' +
          '<p class="pn-label">Издательство · Сообщество · Платформа</p>' +
          '<div class="pn-grid">'+textual+'</div>';
      }

      // Re-render only the nav + featured slot in place (keeps grid + scroll position stable).
      function refreshFeatured(){
        var slot = host.querySelector('.pn-featured-slot');
        if (slot) slot.innerHTML = navBar() + featuredHtml();
      }
      /* Bring the pager to the top of the view — just below the sticky header +
         section tabs, never higher (so the pager, not the chrome, is what shows). */
      function scrollToPager(){
        var slot = host.querySelector('.pn-featured-slot');
        if (!slot || !slot.scrollIntoView) return;
        var hEl = document.querySelector('.site-header[data-ba-frame]');
        var tEl = document.querySelector('.sec-tabs');
        var z = parseFloat(getComputedStyle(document.body).zoom) || 1;
        var chrome = ((hEl ? hEl.getBoundingClientRect().height : 0) + (tEl ? tEl.getBoundingClientRect().height : 0)) / z;
        slot.style.scrollMarginTop = (chrome + 8) + 'px';
        slot.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      host.innerHTML = '<div class="pn-wrap">' +
        '<div class="pn-featured-slot">'+navBar()+featuredHtml()+'</div>' +
        gridHtml() +
      '</div>';

      if (host._newsWired) return;     // delegate once per host element
      host._newsWired = true;
      host.addEventListener('click', function(e){
        if (!host.querySelector('.pn-featured-slot')) return;   // only act while News is shown
        var nav = e.target.closest('[data-nav]');
        if (nav){
          if (nav.getAttribute('data-nav')==='prev' && state.idx>0){ state.idx--; state.expanded=false; refreshFeatured(); }
          else if (nav.getAttribute('data-nav')==='next' && state.idx<arts.length-1){ state.idx++; state.expanded=false; refreshFeatured(); }
          return;
        }
        if (e.target.closest('[data-act="expand"]')){ state.expanded=true; refreshFeatured(); scrollToPager(); return; }
        if (e.target.closest('[data-act="collapse"]')){ state.expanded=false; refreshFeatured(); return; }
        var card = e.target.closest('.pn-card[data-idx]');
        if (card){
          state.idx = parseInt(card.getAttribute('data-idx'), 10) || 0;
          state.expanded = true;
          refreshFeatured();
          scrollToPager();
        }
      });
      host.addEventListener('keydown', function(e){
        if (e.key!=='Enter' && e.key!==' ') return;
        var card = e.target.closest('.pn-card[data-idx]');
        if (!card) return;
        e.preventDefault();
        state.idx = parseInt(card.getAttribute('data-idx'), 10) || 0;
        state.expanded = true;
        refreshFeatured();
        scrollToPager();
      });
    }

    /* ── Pulse (area 17) — mixed-domain event stream ── */
    function eventLine(e){
      var who = e.who && e.who.entity==='bot' ? 'β→α' : memberName(e.who.entity_id);
      var c = e.action.codename, w = e.with_what, p = e.action.params||{};
      var tgt = w ? (w.entity==='publication'? '«'+esc(bookTitle(w.entity_id))+'»' : w.entity==='member'? esc(memberName(w.entity_id)) : esc(w.entity)) : '';
      switch(c){
        case 'comment.created': return '<b>'+esc(who)+'</b> прокомментировал(а) '+tgt;
        case 'review.created': return '<b>'+esc(who)+'</b> написал(а) рецензию на '+tgt+(p.rating?' · ★'+p.rating:'');
        case 'reply.created': return '<b>'+esc(who)+'</b> ответил(а) в обсуждении';
        case 'vote.cast': return '<b>'+esc(who)+'</b> проголосовал(а) за '+(w&&w.entity==='reaction'?'комментарий':tgt);
        case 'reputation.changed': return 'репутация <b>'+esc(memberName(p.recipient_id))+'</b> '+(p.delta>=0?'+':'')+p.delta+(p.rank_crossed?' · новый ранг '+esc(p.new_rank):'');
        case 'shelf.status.changed': return '<b>'+esc(who)+'</b> отметил(а) '+tgt+' — '+esc(p.status==='reading'?'читает':p.status);
        case 'post.published': return p.destination==='public-news'? '<b>β→α</b>: '+esc(p.title||'новость') : '<b>'+esc(who)+'</b> опубликовал(а) запись';
        case 'book.opened': return '<b>'+esc(who)+'</b> открыл(а) '+tgt;
        case 'track.added': return '<b>'+esc(who)+'</b> подписался(ась) на '+tgt;
        default: return '<b>'+esc(who)+'</b> · '+esc(c);
      }
    }
    function renderPulse(host){
      var viewer = ST().activeId();
      var evs = ST().pulse(viewer).slice(0, 60);
      if (!evs.length){ host.innerHTML = '<p class="empty">Пульс пока тих.</p>'; return; }
      host.innerHTML = '<div class="pulse-feed">'+evs.map(function(e){
        var dom = ST().domainOf(e, viewer);
        var cls = dom==='Resource'?' pulse-dot--resource':dom==='Personal'?' pulse-dot--personal':'';
        var label = dom==='Resource'?'Ресурс':dom==='Personal'?'Личное':'Сообщество';
        return '<div class="pulse-row"><span class="pulse-dot'+cls+'"></span>' +
          '<span class="pulse-text">'+eventLine(e)+'</span>' +
          '<span class="pulse-dom">'+label+'</span>' +
          '<span class="pulse-when">'+esc(timeAgo(e.timestamp))+'</span></div>';
      }).join('')+'</div>';
    }

    /* ── frame ── */
    function renderStats(){
      var members = BA.memberData.people().length;
      var disc = ST().find('reactions', function(r){ return r.form==='comment'||r.form==='review'; }).length;
      document.getElementById('sec-stats').innerHTML =
        '<div class="sec-stat"><span class="sec-stat-val">'+members+'</span><span class="sec-stat-lbl">участников</span></div>' +
        '<div class="sec-stat"><span class="sec-stat-val">'+disc+'</span><span class="sec-stat-lbl">обсуждений</span></div>';
    }
    function renderTabs(active){
      document.getElementById('sec-tabs').innerHTML = TABS.map(function(t){
        return '<button class="sec-tab'+(t.key===active?' is-active':'')+'" data-tab="'+t.key+'">'+esc(t.label)+'</button>';
      }).join('');
    }
    function showTab(key){
      var host = document.getElementById('sec-content'); host.innerHTML='';
      renderTabs(key);
      try { BA.store.set(SAVED_KEY, key); } catch(e){}
      var url = new URL(location.href); url.searchParams.set('tab', key); history.replaceState(null,'',url);
      /* Lobby: News is public; every other tab needs login (same gate as cabinet) */
      if (key!=='news' && !BA.session.isPrivate()){
        host.innerHTML = '<div class="sec-gate"><h2>Войдите, чтобы участвовать в Лобби</h2><p>Участники, обсуждения, клубы, публикации и пульс сообщества доступны после входа.</p><button class="btn btn-primary" type="button" onclick="BA.frame.openLogin()">Войти</button></div>';
        return;
      }
      if (key==='member-board') renderMemberBoard(host);
      else if (key==='discussion') renderDiscussion(host);
      else if (key==='reading-club') renderClubs(host);
      else if (key==='post') renderPost(host);
      else if (key==='news') renderNews(host);
      else renderPulse(host);
    }
    document.addEventListener('DOMContentLoaded', function(){
      BA.frame.init({ page: 'community' });
      if (BA.sim) BA.sim.ensure();
      renderStats();
      document.getElementById('sec-tabs').addEventListener('click', function(e){
        var t = e.target.closest('.sec-tab'); if (t) showTab(t.getAttribute('data-tab'));
      });
      document.addEventListener('ba:session-change', function(){ renderStats(); var a=document.querySelector('.sec-tab.is-active'); if(a) showTab(a.getAttribute('data-tab')); });
      var params = new URLSearchParams(location.search);
      var saved = null; try { saved = BA.store.get(SAVED_KEY); } catch(e){}
      var initial = params.get('tab') || saved || 'news';
      if (!TABS.some(function(t){ return t.key===initial; })) initial = 'news';
      /* a guest's remembered (gated) tab → land on the public News instead */
      if (!params.get('tab') && initial!=='news' && !BA.session.isPrivate()) initial = 'news';
      showTab(initial);
    });
  </script>
</body>
</html>
